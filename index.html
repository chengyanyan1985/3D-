<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>虚拟实验平台 - 氢氧化铁溶胶系列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 50, 70, 0.92);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px 20px;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .nav-btn {
            background: #2c5a74;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        .nav-btn i {
            font-size: 1.1rem;
        }
        .nav-btn.active {
            background: #e67e22;
            box-shadow: 0 0 10px rgba(230,126,34,0.5);
        }
        .nav-btn:hover:not(.active) {
            background: #3d7a9a;
            transform: translateY(-2px);
        }
        .iframe-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100% - 60px);
            background: #e0e8f5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* 加载提示（可选） */
        .loading-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
        }
        @media (max-width: 700px) {
            .nav-bar { padding: 8px 12px; gap: 12px; }
            .nav-btn { padding: 6px 16px; font-size: 0.85rem; }
            .iframe-container { top: 52px; height: calc(100% - 52px); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="nav-bar">
        <button class="nav-btn" id="btnExp1">
            <i class="fas fa-flask"></i> 实验1 · 水法制备
        </button>
        <button class="nav-btn" id="btnExp2">
            <i class="fas fa-water"></i> 实验2 · 渗析纯化
        </button>
    </div>
    <div class="iframe-container">
        <!-- 添加加载提示（可选，显示在iframe上层） -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <i class="fas fa-spinner fa-pulse"></i> 加载实验中...
        </div>
        <iframe id="expFrame" src="exp1.html"></iframe>
    </div>

    <script>
        const frame = document.getElementById('expFrame');
        const btn1 = document.getElementById('btnExp1');
        const btn2 = document.getElementById('btnExp2');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function setActive(activeBtn) {
            btn1.classList.remove('active');
            btn2.classList.remove('active');
            activeBtn.classList.add('active');
        }

        // 切换时显示加载提示
        function switchTo(url, activeBtn) {
            if (frame.src.includes(url)) return;
            loadingOverlay.style.display = 'flex';
            frame.src = url;
            setActive(activeBtn);
        }

        // 监听iframe加载完成，隐藏加载提示
        frame.addEventListener('load', () => {
            loadingOverlay.style.display = 'none';
        });

        // 如果初始加载时间过长，设置超时隐藏（防止一直显示）
        setTimeout(() => {
            if (loadingOverlay.style.display === 'flex') {
                loadingOverlay.style.display = 'none';
            }
        }, 5000);

        btn1.addEventListener('click', () => switchTo('exp1.html', btn1));
        btn2.addEventListener('click', () => switchTo('exp2.html', btn2));

        // 初始激活实验1
        setActive(btn1);
    </script>
</body>
</html>
