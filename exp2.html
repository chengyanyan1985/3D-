<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D虚拟实验：氢氧化铁溶胶纯化 · 渗析法 | 小烧杯移至右侧</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #e0e8f5 0%, #cdd9ed 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }
        .control-dashboard {
            width: 320px;
            background: rgba(22, 34, 48, 0.82);
            backdrop-filter: blur(20px);
            border-radius: 0 28px 28px 0;
            margin: 0;
            padding: 20px 18px;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .control-dashboard::-webkit-scrollbar { width: 4px; }
        .control-dashboard::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .control-dashboard::-webkit-scrollbar-thumb { background: #ffa559; border-radius: 4px; }
        
        .experiment-title {
            text-align: center;
            margin-bottom: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255, 180, 100, 0.5);
        }
        .experiment-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffefcf;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .experiment-title p {
            font-size: 0.7rem;
            color: #cbd5e6;
            margin-top: 6px;
        }
        
        .steps-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(10,20,28,0.4);
            padding: 12px;
            border-radius: 24px;
            backdrop-filter: blur(4px);
        }
        .step-chip {
            background: rgba(210,225,245,0.2);
            color: #f0f6ff;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,240,0.2);
            transition: all 0.2s ease;
        }
        .step-chip i { width: 24px; text-align: center; font-size: 1.1rem; }
        .step-chip.active {
            background: linear-gradient(135deg, #e68a2e, #c95f1a);
            color: white;
            box-shadow: 0 4px 12px rgba(218,94,20,0.4);
            border-color: #ffbc7a;
            transform: scale(1.02);
        }
        .step-chip.completed {
            background: #2c6e4fdd;
            color: #eefcee;
            border-color: #7dcea0;
        }
        
        .metrics {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 14px 16px;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .cond-meter, .exchange-progress {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-weight: 600;
            color: #ffefcf;
            flex-wrap: wrap;
        }
        .cond-value {
            font-size: 1.6rem;
            font-family: monospace;
            background: #02111f;
            color: #ffd966;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 800;
        }
        .progress-bar-bg {
            flex: 1;
            background: #2b3b44;
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ff7e05);
            transition: width 0.35s ease;
        }
        .step-description {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 8px 12px;
            color: #e9f5ff;
            text-align: center;
            line-height: 1.3;
        }
        
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            background: linear-gradient(110deg, #2f5575, #1d3b54);
            border: none;
            padding: 10px 0;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }
        .btn:active { transform: translateY(2px); }
        .btn.exchange-btn { background: linear-gradient(135deg, #db7d2c, #b85f1e); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .smart-hint {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            border-radius: 28px;
            font-size: 0.75rem;
            color: #fcf9ea;
            border-left: 3px solid #ffa559;
            margin-top: 12px;
            text-align: center;
        }
        
        #canvas-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #cbdbe9, #b7c3dc);
            overflow: hidden;
        }
        
        @media (max-width: 780px) {
            .app-container { flex-direction: column; }
            .control-dashboard {
                width: 100%;
                border-radius: 0 0 24px 24px;
                max-height: 45%;
                padding: 16px;
                gap: 12px;
            }
            .steps-group { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .step-chip { padding: 6px 14px; font-size: 0.75rem; }
            .metrics { flex-direction: row; flex-wrap: wrap; justify-content: space-between; }
            .action-group { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .btn { padding: 8px 18px; min-width: 100px; }
            .smart-hint { display: none; }
            .experiment-title h2 { font-size: 1rem; }
        }
        
        .toast-message {
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3cd9;
            backdrop-filter: blur(20px);
            color: #ffecb3;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 200;
            font-size: 0.9rem;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="control-dashboard">
        <div class="experiment-title">
            <h2>2. 氢氧化铁溶胶纯化 · 渗析法</h2>
            <p><i class="fas fa-flask"></i> 珂罗酊袋渗析 | Cl⁻离子迁移 | 纯化胶体显色铁锈黄</p>
        </div>
        
        <div class="steps-group" id="stepsGroup">
            <div class="step-chip" data-step="1"><i class="fas fa-box-open"></i> 1. 准备半透膜袋</div>
            <div class="step-chip" data-step="2"><i class="fas fa-fill-drip"></i> 2. 装入Fe(OH)₃溶胶</div>
            <div class="step-chip" data-step="3"><i class="fas fa-water"></i> 3. 浸入蒸馏水</div>
            <div class="step-chip" data-step="4"><i class="fas fa-sync-alt"></i> 4. 换水 (<span id="dynamicExText">0</span>/10)</div>
            <div class="step-chip" data-step="5"><i class="fas fa-check-double"></i> 5. 纯化完成 & 转移胶体</div>
        </div>
        
        <div class="metrics">
            <div class="cond-meter">
                <span><i class="fas fa-charging-station"></i> 电导率</span>
                <span class="cond-value" id="condDisplay">1800</span>
                <span>µS/cm</span>
            </div>
            <div class="exchange-progress">
                <span><i class="fas fa-tint"></i> 换水进度</span>
                <span id="exchangeCount">0</span><span>/10</span>
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
                <i class="fas fa-chlorine"></i>
            </div>
            <div class="step-description" id="stepHelperTxt">
                <i class="fas fa-info-circle"></i> 点击步骤开始实验
            </div>
        </div>
        
        <div class="action-group">
            <button class="btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> 上一步</button>
            <button class="btn" id="nextBtn">下一步 <i class="fas fa-arrow-right"></i></button>
            <button class="btn exchange-btn" id="exchangeBtn" disabled><i class="fas fa-water"></i> 换水一次</button>
            <button class="btn reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置实验</button>
        </div>
        
        <div class="smart-hint">
            <i class="fas fa-atom"></i> 渗析原理：换水时清除旧水中Cl⁻（绿色粒子），新水接收从袋内迁移出的Cl⁻ | 纯化后小烧杯液体显示铁锈黄色
        </div>
    </div>
    
    <div id="canvas-container"></div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // 实验状态
    let currentStep = 1;      
    let exchanges = 0;
    const MAX_EX = 10;
    let transferred = false;
    let chloridesInitialized = false;
    
    // DOM 元素
    const stepChips = document.querySelectorAll('.step-chip');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const exchangeBtn = document.getElementById('exchangeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const condDisplaySpan = document.getElementById('condDisplay');
    const exchangeCountSpan = document.getElementById('exchangeCount');
    const progressFill = document.getElementById('progressFill');
    const stepHelperTxt = document.getElementById('stepHelperTxt');
    const dynamicExText = document.getElementById('dynamicExText');
    
    function showToast(msg, isError = false) {
        const existing = document.querySelector('.toast-message');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        toast.style.background = isError ? '#aa3e2cd9' : '#1f513ad9';
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
    }
    
    function calcConductivity() {
        if (exchanges === 0) return 1800;
        if (exchanges >= MAX_EX) return 98;
        let cond = 1800 * Math.exp(-0.28 * exchanges);
        return Math.max(98, Math.round(cond));
    }
    
    // --- 3D 场景 ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xadd8e6);
    scene.fog = new THREE.FogExp2(0xadd8e6, 0.025);
    
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(4.5, 3.2, 5.8);
    camera.lookAt(0.8, 0.6, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enableZoom = true;
    controls.target.set(0.8, 0.6, 0);
    
    // 灯光
    const ambientLight = new THREE.AmbientLight(0x5c6e7e);
    scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
    mainLight.position.set(3, 5, 2);
    mainLight.castShadow = true;
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0xddaa77, 0.5);
    fillLight.position.set(1, 2, 2.5);
    scene.add(fillLight);
    const backRim = new THREE.PointLight(0x88aadd, 0.45);
    backRim.position.set(-1.5, 1, -2);
    scene.add(backRim);
    
    // 木纹实验台面
    const tableWidth = 6.5;
    const tableDepth = 4.5;
    const tableHeight = 0.15;
    const tableY = -0.9;
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#c9a87b';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#b58f5e';
    ctx.lineWidth = 8;
    for (let i = 0; i < 80; i++) {
        ctx.beginPath();
        const y = Math.random() * canvas.height;
        ctx.moveTo(0, y);
        let x = 0;
        while (x < canvas.width) {
            x += 20 + Math.random() * 30;
            ctx.lineTo(x, y + (Math.random() - 0.5) * 25);
        }
        ctx.stroke();
    }
    ctx.strokeStyle = '#a27a4a';
    ctx.lineWidth = 3;
    for (let i = 0; i < 150; i++) {
        ctx.beginPath();
        const y = Math.random() * canvas.height;
        ctx.moveTo(0, y);
        let x = 0;
        while (x < canvas.width) {
            x += 15 + Math.random() * 20;
            ctx.lineTo(x, y + (Math.random() - 0.5) * 15);
        }
        ctx.stroke();
    }
    const woodTexture = new THREE.CanvasTexture(canvas);
    woodTexture.wrapS = THREE.RepeatWrapping;
    woodTexture.wrapT = THREE.RepeatWrapping;
    woodTexture.repeat.set(2, 2);
    const tableMat = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.6, metalness: 0.1, color: 0xc9a87b });
    const tableTop = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, tableHeight, tableDepth), tableMat);
    tableTop.position.set(0, tableY + tableHeight / 2, 0);
    tableTop.castShadow = true;
    tableTop.receiveShadow = true;
    scene.add(tableTop);
    
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0xb58f5e, roughness: 0.5 });
    const frontEdge = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, 0.08, 0.15), edgeMat);
    frontEdge.position.set(0, tableY + tableHeight - 0.02, tableDepth / 2 - 0.1);
    frontEdge.castShadow = true;
    scene.add(frontEdge);
    const backEdge = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, 0.08, 0.15), edgeMat);
    backEdge.position.set(0, tableY + tableHeight - 0.02, -tableDepth / 2 + 0.1);
    backEdge.castShadow = true;
    scene.add(backEdge);
    const leftEdge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, tableDepth), edgeMat);
    leftEdge.position.set(-tableWidth / 2 + 0.1, tableY + tableHeight - 0.02, 0);
    leftEdge.castShadow = true;
    scene.add(leftEdge);
    const rightEdge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, tableDepth), edgeMat);
    rightEdge.position.set(tableWidth / 2 - 0.1, tableY + tableHeight - 0.02, 0);
    rightEdge.castShadow = true;
    scene.add(rightEdge);
    
    const legMat = new THREE.MeshStandardMaterial({ color: 0x9a7a4a, roughness: 0.7 });
    const legPositions = [[-2, -0.4, -1.5], [2, -0.4, -1.5], [-2, -0.4, 1.5], [2, -0.4, 1.5]];
    legPositions.forEach(pos => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), legMat);
        leg.position.set(pos[0], tableY - 0.35, pos[2]);
        leg.castShadow = true;
        scene.add(leg);
    });
    
    // 大烧杯
    const bigBeakerGroup = new THREE.Group();
    const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xcae3ff, metalness: 0.85, roughness: 0.18, transparent: true, opacity: 0.32, clearcoat: 0.6 });
    const glassCyl = new THREE.Mesh(new THREE.CylinderGeometry(1.45, 1.45, 2.4, 56), glassMat);
    glassCyl.castShadow = true;
    glassCyl.position.y = 0;
    bigBeakerGroup.add(glassCyl);
    const waterHeight = 1.6;
    const waterBottomY = -0.925;
    const waterTopY = waterBottomY + waterHeight;
    const waterCenterY = (waterBottomY + waterTopY) / 2;
    const waterMat = new THREE.MeshPhysicalMaterial({ color: 0x9bc5ff, emissive: 0x2266aa, transparent: true, opacity: 0.7 });
    const waterVolume = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, waterHeight, 48), waterMat);
    waterVolume.position.y = waterCenterY;
    bigBeakerGroup.add(waterVolume);
    const bottomMat = new THREE.MeshStandardMaterial({ color: 0xcceeff, metalness: 0.7, roughness: 0.2 });
    const bottomDisc = new THREE.Mesh(new THREE.CylinderGeometry(1.44, 1.44, 0.06, 32), bottomMat);
    bottomDisc.position.y = -1.18;
    bigBeakerGroup.add(bottomDisc);
    const bigBeakerRim = new THREE.Mesh(new THREE.TorusGeometry(1.45, 0.045, 32, 100), glassMat);
    bigBeakerRim.position.y = 1.2;
    bigBeakerRim.rotation.x = Math.PI / 2;
    bigBeakerGroup.add(bigBeakerRim);
    bigBeakerGroup.position.set(0, 0, 0);
    scene.add(bigBeakerGroup);
    
    // 小烧杯：移至主烧杯右侧，保持距离
    const smallBeakerGroup = new THREE.Group();
    const smallGlassMat = new THREE.MeshPhysicalMaterial({ color: 0xcae3ff, metalness: 0.8, roughness: 0.2, transparent: true, opacity: 0.35 });
    const smallCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 1.2, 48), smallGlassMat);
    smallCyl.castShadow = true;
    smallBeakerGroup.add(smallCyl);
    const smallWaterMat = new THREE.MeshPhysicalMaterial({ color: 0x9bc5ff, transparent: true, opacity: 0.6 });
    const smallWater = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.75, 0.7, 32), smallWaterMat);
    smallWater.position.y = -0.2;
    smallBeakerGroup.add(smallWater);
    const smallBottom = new THREE.Mesh(new THREE.CylinderGeometry(0.84, 0.84, 0.05, 24), new THREE.MeshStandardMaterial({ color: 0xcceeff }));
    smallBottom.position.y = -0.55;
    smallBeakerGroup.add(smallBottom);
    const smallBeakerRim = new THREE.Mesh(new THREE.TorusGeometry(0.85, 0.04, 28, 80), smallGlassMat);
    smallBeakerRim.position.y = 0.6;
    smallBeakerRim.rotation.x = Math.PI / 2;
    smallBeakerGroup.add(smallBeakerRim);
    // 新位置：主烧杯右侧，x=2.6, z=0.2，避免与右侧边缘碰撞
    smallBeakerGroup.position.set(2.6, -0.2, 0.2);
    smallBeakerGroup.visible = false;
    scene.add(smallBeakerGroup);
    
    // 半透膜袋组
    const bagGroup = new THREE.Group();
    const membraneMat = new THREE.MeshPhysicalMaterial({ 
        color: 0xdbbd92, metalness: 0.55, roughness: 0.32, transparent: true, opacity: 0.48,
        side: THREE.DoubleSide, emissive: 0x331a00, emissiveIntensity: 0.12, clearcoat: 0.7
    });
    const bagMesh = new THREE.Mesh(new THREE.SphereGeometry(0.82, 64, 64), membraneMat);
    bagMesh.scale.set(1.15, 1.38, 0.96);
    bagMesh.position.y = 0.1;
    bagGroup.add(bagMesh);
    
    const wireframeMat = new THREE.MeshBasicMaterial({ color: 0xccaa88, wireframe: true, transparent: true, opacity: 0.2 });
    const wireframeSphere = new THREE.Mesh(new THREE.SphereGeometry(0.84, 32, 32), wireframeMat);
    wireframeSphere.scale.set(1.16, 1.4, 0.98);
    wireframeSphere.position.y = 0.1;
    bagGroup.add(wireframeSphere);
    
    const solCore = new THREE.Mesh(new THREE.SphereGeometry(0.72, 64, 64), 
        new THREE.MeshStandardMaterial({ color: 0xb6532a, emissive: 0x5a2a12, roughness: 0.25, metalness: 0.1 }));
    solCore.scale.set(1.1, 1.32, 0.92);
    solCore.position.y = 0.1;
    bagGroup.add(solCore);
    
    // Fe(OH)₃ 胶粒（袋内）
    const feParticlesGroup = new THREE.Group();
    const feParticleCount = 52;
    let bagFeParticles = [];
    function createFeParticles(targetGroup, count, scaleRange = 0.68) {
        const particles = [];
        for (let i = 0; i < count; i++) {
            const colorVariation = 0x9b4a2a + Math.floor(Math.random() * 0x442200);
            const particleMat = new THREE.MeshStandardMaterial({ color: colorVariation, emissive: 0x442200, emissiveIntensity: 0.2 + Math.random() * 0.2, roughness: 0.3 });
            const size = 0.045 + Math.random() * 0.032;
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 10), particleMat);
            const theta = Math.acos(2 * Math.random() - 1);
            const phi = 2 * Math.PI * Math.random();
            const r = scaleRange * Math.cbrt(Math.random());
            sphere.position.x = Math.sin(theta) * Math.cos(phi) * r * 1.05;
            sphere.position.z = Math.sin(theta) * Math.sin(phi) * r * 0.92;
            sphere.position.y = Math.cos(theta) * r * 1.22 + 0.1;
            sphere.userData = { phase: Math.random() * Math.PI * 2 };
            targetGroup.add(sphere);
            particles.push(sphere);
        }
        return particles;
    }
    
    bagFeParticles = createFeParticles(feParticlesGroup, feParticleCount, 0.68);
    bagGroup.add(feParticlesGroup);
    
    const feLabelDiv = document.createElement('div');
    feLabelDiv.textContent = '🔴 Fe(OH)₃ 胶粒 (留在袋内)';
    feLabelDiv.style.backgroundColor = '#8b3a1ad9';
    feLabelDiv.style.padding = '2px 12px';
    feLabelDiv.style.borderRadius = '20px';
    feLabelDiv.style.fontSize = '10px';
    feLabelDiv.style.fontWeight = 'bold';
    feLabelDiv.style.color = '#ffddb0';
    const feLabel = new CSS2DObject(feLabelDiv);
    feLabel.position.set(1.15, 0.55, 0.92);
    bagGroup.add(feLabel);
    
    const mainLabelDiv = document.createElement('div');
    mainLabelDiv.textContent = '🧪 珂罗酊袋 (半透膜) | Fe(OH)₃胶粒 + Cl⁻离子';
    mainLabelDiv.style.backgroundColor = '#2f241cd9';
    mainLabelDiv.style.padding = '4px 16px';
    mainLabelDiv.style.borderRadius = '28px';
    mainLabelDiv.style.fontSize = '12px';
    mainLabelDiv.style.fontWeight = 'bold';
    mainLabelDiv.style.color = '#ffedc9';
    const mainLabel = new CSS2DObject(mainLabelDiv);
    mainLabel.position.set(0, 1.35, 0);
    bagGroup.add(mainLabel);
    
    scene.add(bagGroup);
    
    // ----- Cl⁻ 离子系统 -----
    let innerChlorides = [];
    let outerChlorides = [];
    let activeMovingParticles = [];
    
    function getRandomInnerPosition() {
        const theta = Math.acos(2 * Math.random() - 1);
        const phi = 2 * Math.PI * Math.random();
        const r = 0.68 * Math.cbrt(Math.random());
        const x = Math.sin(theta) * Math.cos(phi) * r * 1.05;
        const z = Math.sin(theta) * Math.sin(phi) * r * 0.9;
        const y = Math.cos(theta) * r * 1.22 + 0.1;
        return new THREE.Vector3(x, y, z);
    }
    
    function getRandomOuterPosition() {
        let x, z, y;
        do {
            x = (Math.random() - 0.5) * 2.5;
            z = (Math.random() - 0.5) * 2.5;
            y = Math.random() * 0.7 - 0.2;
        } while (Math.hypot(x, z) < 1.0 && y > -0.1 && y < 0.7);
        return new THREE.Vector3(x, y, z);
    }
    
    function createChlorideIon(pos, isInner = true) {
        const color = isInner ? 0xaaffaa : 0x88ff88;
        const mat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x226622, emissiveIntensity: 0.2 });
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12), mat);
        sphere.position.copy(pos);
        return sphere;
    }
    
    function createPathLine(start, end, color = 0x33ccff) {
        const points = [start.clone(), end.clone()];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
        return new THREE.Line(geometry, material);
    }
    
    function initChloridesForStep2() {
        if (chloridesInitialized) return;
        for (let i = 0; i < 28; i++) {
            const pos = getRandomInnerPosition();
            const ion = createChlorideIon(pos, true);
            innerChlorides.push(ion);
            bagGroup.add(ion);
        }
        chloridesInitialized = true;
    }
    
    function clearAllChlorides() {
        activeMovingParticles.forEach(p => { if(p.mesh) scene.remove(p.mesh); if(p.pathLine) scene.remove(p.pathLine); });
        activeMovingParticles = [];
        innerChlorides.forEach(ion => bagGroup.remove(ion));
        outerChlorides.forEach(ion => scene.remove(ion));
        innerChlorides = [];
        outerChlorides = [];
        chloridesInitialized = false;
    }
    
    function resetChlorideSystem() {
        clearAllChlorides();
    }
    
    function updateBagPosition(step, animate = true) {
        const outsidePos = new THREE.Vector3(2.8, 0.15, 0.8);
        const insidePos = new THREE.Vector3(0, 0.1, 0);
        const targetPos = (step >= 3) ? insidePos : outsidePos;
        if (animate && step === 3 && currentStep < 3) {
            const startPos = bagGroup.position.clone();
            const duration = 500;
            const startTime = performance.now();
            function animateMove(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - t, 3);
                bagGroup.position.lerpVectors(startPos, targetPos, ease);
                if (t < 1) requestAnimationFrame(animateMove);
                else bagGroup.position.copy(targetPos);
            }
            requestAnimationFrame(animateMove);
        } else {
            bagGroup.position.copy(targetPos);
        }
    }
    
    // 转移胶体：直接让小烧杯液体变色为铁锈黄色，并让胶粒飞入小烧杯内（不显示路径，只变色）
    function transferColloid() {
        if (transferred) return;
        transferred = true;
        smallBeakerGroup.visible = true;
        // 氢氧化铁溶胶典型铁锈黄色
        smallWater.material.color.setHex(0xcc8844);
        smallWater.material.emissive = 0x552200;
        smallWater.material.emissiveIntensity = 0.12;
        // 隐藏袋内胶粒
        feParticlesGroup.visible = false;
        // 更新标签
        feLabelDiv.textContent = '🔴 Fe(OH)₃ 胶粒 (已转移至小烧杯)';
        mainLabelDiv.textContent = '🧪 空袋 (胶体已移出)';
        showToast("🧪 纯化完成！氢氧化铁溶胶已转移至右侧小烧杯，液体呈铁锈黄色", false);
    }
    
    function performExchange() {
        if (currentStep !== 4) { showToast("请先进入「浸入渗析」步骤再进行换水", true); return; }
        if (exchanges >= MAX_EX) { showToast("已完成10次换水，溶胶已高度纯化", true); return; }
        
        outerChlorides.forEach(ion => scene.remove(ion));
        outerChlorides = [];
        exchanges++;
        
        let migrateNum = 3;
        if (exchanges >= 8) migrateNum = 2;
        if (exchanges >= 9) migrateNum = 1;
        if (innerChlorides.length < migrateNum) migrateNum = innerChlorides.length;
        
        if (migrateNum > 0) {
            for (let i = 0; i < migrateNum; i++) {
                const ion = innerChlorides.pop();
                if (!ion) break;
                const startPos = ion.position.clone();
                const targetPos = getRandomOuterPosition();
                const pathLine = createPathLine(startPos, targetPos, 0x44aaff);
                scene.add(pathLine);
                activeMovingParticles.push({
                    mesh: ion, startPos, targetPos, progress: 0, duration: 0.65, elapsed: 0, pathLine
                });
                bagGroup.remove(ion);
            }
            showToast(`💧 换水 ${exchanges}/10 | 旧水已倒掉，新水中接收从袋内迁移的 Cl⁻ 离子`, false);
        } else {
            showToast(`💧 换水 ${exchanges}/10 | 袋内已无Cl⁻离子可迁移，新水保持纯净`, false);
        }
        
        updateUIAndTrend();
        updateVisualByStep();
        if (exchanges === MAX_EX) showToast("✨ 已完成10次换水！Cl⁻ 离子已基本去除，可进入纯化完成步骤", false);
    }
    
    function updateMigrationAnimation(deltaTime) {
        if (activeMovingParticles.length === 0) return;
        const delta = Math.min(deltaTime, 0.033);
        for (let i = activeMovingParticles.length-1; i >= 0; i--) {
            const p = activeMovingParticles[i];
            p.elapsed += delta;
            p.progress = Math.min(1, p.elapsed / p.duration);
            const t = 1 - Math.pow(1 - p.progress, 3);
            p.mesh.position.lerpVectors(p.startPos, p.targetPos, t);
            if (p.progress >= 1) {
                p.mesh.position.copy(p.targetPos);
                p.mesh.material.color.setHex(0x88ff88);
                outerChlorides.push(p.mesh);
                scene.add(p.mesh);
                if(p.pathLine) scene.remove(p.pathLine);
                activeMovingParticles.splice(i,1);
            }
        }
    }
    
    function syncChlorideCounts() {
        if (!chloridesInitialized) return;
        const targetInner = Math.max(0, Math.floor(28 * (1 - exchanges / MAX_EX)));
        while (innerChlorides.length > targetInner) {
            const rem = innerChlorides.pop();
            if(rem) bagGroup.remove(rem);
        }
        while (innerChlorides.length < targetInner) {
            const pos = getRandomInnerPosition();
            const ion = createChlorideIon(pos, true);
            innerChlorides.push(ion);
            bagGroup.add(ion);
        }
    }
    
    function nextStep() {
        if (currentStep < 5) {
            if (currentStep === 4 && exchanges < MAX_EX) {
                showToast("⚠️ 请先完成10次换水，再进入纯化完成步骤", true);
                return;
            }
            const oldStep = currentStep;
            currentStep++;
            if (currentStep === 5 && exchanges < MAX_EX) {
                currentStep = 4;
                showToast("必须完成10次换水后实验方可圆满结束", true);
                return;
            }
            if (oldStep === 1 && currentStep === 2) {
                initChloridesForStep2();
            }
            refreshAll();
            if (oldStep === 2 && currentStep === 3) {
                updateBagPosition(currentStep, true);
            } else {
                updateBagPosition(currentStep, false);
            }
            if (currentStep === 5 && !transferred && exchanges >= MAX_EX) {
                transferColloid();
            }
            if (currentStep === 5) {
                showToast("🎉 纯化完成！氢氧化铁溶胶已转移至右侧小烧杯，液体呈铁锈黄色，待测电导率", false);
            }
        }
    }
    
    function prevStep() {
        if (currentStep > 1) {
            const oldStep = currentStep;
            currentStep--;
            if (oldStep === 2 && currentStep === 1) {
                clearAllChlorides();
            }
            refreshAll();
            updateBagPosition(currentStep, false);
        }
    }
    
    function resetExperiment() {
        currentStep = 1;
        exchanges = 0;
        transferred = false;
        clearAllChlorides();
        smallBeakerGroup.visible = false;
        smallWater.material.color.setHex(0x9bc5ff);
        smallWater.material.emissive = 0x000000;
        smallWater.material.emissiveIntensity = 0;
        feParticlesGroup.visible = true;
        bagFeParticles.forEach(p => feParticlesGroup.add(p));
        bagFeParticles = [...bagFeParticles];
        feLabelDiv.textContent = '🔴 Fe(OH)₃ 胶粒 (留在袋内)';
        mainLabelDiv.textContent = '🧪 珂罗酊袋 (半透膜) | Fe(OH)₃胶粒 + Cl⁻离子';
        refreshAll();
        updateBagPosition(1, false);
        camera.position.set(4.5, 3.2, 5.8);
        controls.target.set(0.8, 0.6, 0);
        controls.update();
        showToast("实验已重置，Fe(OH)₃ 胶粒重新充满袋内，Cl⁻离子将在步骤2出现", false);
    }
    
    function updateUIAndTrend() {
        stepChips.forEach((chip, idx) => {
            const stepNum = idx + 1;
            chip.classList.remove('active', 'completed');
            if (stepNum === currentStep) chip.classList.add('active');
            else if (stepNum < currentStep) chip.classList.add('completed');
        });
        dynamicExText.innerText = exchanges;
        prevBtn.disabled = (currentStep === 1);
        nextBtn.disabled = (currentStep === 5);
        exchangeBtn.disabled = !(currentStep === 4 && exchanges < MAX_EX);
        const cond = calcConductivity();
        condDisplaySpan.innerText = cond;
        exchangeCountSpan.innerText = exchanges;
        progressFill.style.width = (exchanges / MAX_EX * 100) + '%';
        
        if (currentStep === 1) stepHelperTxt.innerHTML = `<i class="fas fa-hand-peace"></i> 步骤1: 检查珂罗酊半透膜袋（空袋，无Cl⁻离子）`;
        else if (currentStep === 2) stepHelperTxt.innerHTML = `<i class="fas fa-fill"></i> 步骤2: 向袋内注入 Fe(OH)₃ 溶胶，Cl⁻离子出现`;
        else if (currentStep === 3) stepHelperTxt.innerHTML = `<i class="fas fa-water"></i> 步骤3: 将溶胶袋浸入蒸馏水中，渗析开始`;
        else if (currentStep === 4) stepHelperTxt.innerHTML = `<i class="fas fa-sync-alt"></i> 步骤4: 多次换水，每次先倒掉旧水，再让 Cl⁻ 迁移到新水中`;
        else if (currentStep === 5) stepHelperTxt.innerHTML = `<i class="fas fa-trophy"></i> 纯化完成！氢氧化铁溶胶已转移至右侧小烧杯，液体呈铁锈黄色，待测电导率。`;
    }
    
    function updateVisualByStep() {
        if (currentStep === 1) {
            solCore.material.transparent = true; solCore.material.opacity = 0.25;
            bagMesh.material.opacity = 0.38;
            feParticlesGroup.visible = false;
        } else {
            solCore.material.transparent = false; solCore.material.opacity = 1;
            bagMesh.material.opacity = 0.52;
            if (!transferred) feParticlesGroup.visible = true;
        }
        waterVolume.material.color.setHex(currentStep >= 3 ? 0x86bbe8 : 0xa0ceff);
        solCore.material.emissiveIntensity = 0.08 * (1 - exchanges/MAX_EX*0.5);
    }
    
    function refreshAll() {
        updateUIAndTrend();
        updateVisualByStep();
        if (currentStep >= 2 && chloridesInitialized) {
            syncChlorideCounts();
        }
    }
    
    let timeAcc = 0;
    function animateFeParticles(delta) {
        if (!transferred && feParticlesGroup.visible) {
            timeAcc += delta;
            bagFeParticles.forEach(part => {
                if (part.parent) {
                    const scale = 1 + Math.sin(timeAcc * 3.5 + part.userData.phase) * 0.07;
                    part.scale.set(scale, scale, scale);
                }
            });
        }
    }
    
    const bubbles = [];
    for (let i = 0; i < 42; i++) {
        const bGeo = new THREE.SphereGeometry(0.022, 6);
        const bMat = new THREE.MeshStandardMaterial({ color: 0xbbffff, emissive: 0x4488aa, transparent: true, opacity: 0.5 });
        const b = new THREE.Mesh(bGeo, bMat);
        b.userData = { speed: 0.0015 + Math.random() * 0.012, x: (Math.random() - 0.5) * 2.8, z: (Math.random() - 0.5) * 2.8, y: Math.random() * 1.3 };
        b.position.set(b.userData.x, b.userData.y, b.userData.z);
        scene.add(b);
        bubbles.push(b);
    }
    function animateBubbles() {
        bubbles.forEach(b => { b.position.y += b.userData.speed; if (b.position.y > 1.25) b.position.y = -0.8; });
    }
    
    const css2DRenderer = new CSS2DRenderer();
    css2DRenderer.setSize(container.clientWidth, container.clientHeight);
    css2DRenderer.domElement.style.position = 'absolute';
    css2DRenderer.domElement.style.top = '0px';
    css2DRenderer.domElement.style.left = '0px';
    css2DRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(css2DRenderer.domElement);
    
    nextBtn.addEventListener('click', nextStep);
    prevBtn.addEventListener('click', prevStep);
    resetBtn.addEventListener('click', resetExperiment);
    exchangeBtn.addEventListener('click', performExchange);
    stepChips.forEach((chip, idx) => {
        chip.addEventListener('click', () => {
            const target = idx + 1;
            if (target === currentStep) return;
            if (target < currentStep) { 
                if (currentStep === 2 && target === 1) clearAllChlorides();
                currentStep = target;
                refreshAll();
                updateBagPosition(currentStep, false);
            } else if (target === currentStep + 1) nextStep();
            else showToast("请按实验顺序逐步操作", true);
        });
    });
    
    let lastFrameTime = performance.now();
    function animate() {
        const now = performance.now();
        let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
        lastFrameTime = now;
        updateMigrationAnimation(delta);
        animateFeParticles(delta);
        animateBubbles();
        controls.update();
        renderer.render(scene, camera);
        css2DRenderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    resetChlorideSystem();
    refreshAll();
    updateBagPosition(1, false);
    lastFrameTime = performance.now();
    animate();
    
    window.addEventListener('resize', () => {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        css2DRenderer.setSize(w, h);
    });
    setTimeout(() => showToast("✨ 小烧杯已移至主烧杯右侧，与主烧杯保持距离", false), 800);
</script>
</body>
