<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D虚拟实验：氢氧化铁溶胶制备 · 煮沸计时版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 360px;
            background: rgba(30, 50, 70, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            color: #f0f4fa;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            z-index: 10;
            pointer-events: auto;
            font-weight: 500;
        }
        .ui-panel h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffd966;
        }
        .ui-panel h1 i {
            font-size: 1.8rem;
            color: #e67e22;
        }
        .badge-lab {
            background: #e67e22;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .reagent-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 12px;
        }
        .reagent-item {
            background: #2c3e4e;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .step-progress {
            margin: 20px 0;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .step-item.active {
            background: #e67e22cc;
            border-color: #ffb347;
            box-shadow: 0 0 12px rgba(230,126,34,0.6);
        }
        .step-item.completed {
            background: #2c6e2ccc;
            text-decoration: line-through;
            opacity: 0.7;
        }
        .step-index {
            width: 32px;
            height: 32px;
            background: #1f2c38;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .step-desc-box {
            background: rgba(0,0,0,0.55);
            border-radius: 28px;
            padding: 14px 18px;
            margin: 15px 0;
            font-size: 0.9rem;
            border-left: 6px solid #e67e22;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn {
            background: #2c5a74;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.05s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn {
            background: #6c4f3a;
        }
        .drip-btn {
            background: #b85c2a;
        }
        .footer-note {
            font-size: 0.75rem;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-hint {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            color: #cccccc;
        }
        @media (max-width: 700px) {
            .ui-panel { width: 300px; font-size: 0.8rem; top: 10px; left: 10px; padding: 12px; }
            .action-btn { padding: 6px 12px; }
        }
        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #ffd966;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
            font-size: 1rem;
        }
        .timer-text {
            color: #ffaa66;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h1><i class="fas fa-flask"></i> Fe(OH)₃ 溶胶 · 水解法</h1>
        <div class="badge-lab"><i class="fas fa-temperature-high"></i> 双烧杯独立溶解 | 精准滴加</div>
        <div class="reagent-list">
            <div class="reagent-item"><i class="fas fa-cube"></i> 0.5g FeCl₃</div>
            <div class="reagent-item"><i class="fas fa-water"></i> 20mL 蒸馏水</div>
            <div class="reagent-item"><i class="fas fa-fire"></i> 200mL 沸水</div>
            <div class="reagent-item"><i class="fas fa-eye-dropper"></i> 胶头滴管</div>
        </div>
        <div class="step-progress" id="stepListContainer"></div>
        <div class="step-desc-box" id="stepDesc">点击下方按钮，开始3D实验操作</div>
        <div class="action-buttons">
            <button class="action-btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> 上一步</button>
            <button class="action-btn" id="nextBtn">下一步 <i class="fas fa-arrow-right"></i></button>
            <button class="action-btn reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置</button>
        </div>
        <div class="action-buttons">
            <button class="action-btn drip-btn" id="dripBtn"><i class="fas fa-tint"></i> 手动滴加一滴</button>
        </div>
        <div class="control-hint">
            <i class="fas fa-mouse-pointer"></i> 鼠标左键旋转视角 | 右键拖拽平移 | 滚轮缩放
        </div>
        <div class="footer-note">
            <div><i class="fas fa-atom"></i> 水解: FeCl₃ + 3H₂O → Fe(OH)₃(溶胶) + 3HCl</div>
            <div><i class="fas fa-lightbulb"></i> 沸水中水解形成溶胶，避免沉淀</div>
        </div>
    </div>
    <div class="status-badge" id="liquidStatus">🧪 初始状态</div>

    <div id="canvas-container" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:0;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // 初始化场景
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xadd8e6);
        scene.fog = new THREE.FogExp2(0xadd8e6, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3.2, 6.5);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        // 配置 OrbitControls：支持旋转、平移（右键）、缩放
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.enablePan = true;          // 启用平移
        controls.panSpeed = 1.0;
        // 默认鼠标左键旋转，右键平移，中键缩放（无需额外配置）

        // 灯光
        const ambientLight = new THREE.AmbientLight(0x8cb3d9, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.1);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0xffaa77, 0.5);
        backLight.position.set(-2, 2.5, -2);
        scene.add(backLight);
        const fillLightCool = new THREE.PointLight(0xaaccff, 0.45);
        fillLightCool.position.set(1.5, 1.5, 2);
        scene.add(fillLightCool);
        const tableFill = new THREE.PointLight(0xdbb87c, 0.4);
        tableFill.position.set(0, -0.2, 1);
        scene.add(tableFill);
        const heatLight = new THREE.PointLight(0xff5500, 0);
        heatLight.position.set(0, 0.05, 0.6);
        scene.add(heatLight);

        // 实验台面
        const woodTexture = (() => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#c9a87b';
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 600; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 512, Math.random() * 512);
                ctx.lineTo(Math.random() * 512, Math.random() * 512);
                ctx.strokeStyle = `rgba(80, 50, 20, ${Math.random() * 0.3})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 1.5);
            return texture;
        })();
        const tableMat = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.6, metalness: 0.05 });
        const tablePlane = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), tableMat);
        tablePlane.rotation.x = -Math.PI / 2;
        tablePlane.position.y = -0.58;
        tablePlane.receiveShadow = true;
        scene.add(tablePlane);

        // ========== 通用玻璃材质 ==========
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xd0ecff, metalness: 0.95, roughness: 0.18, transparent: true,
            opacity: 0.32, clearcoat: 1.0, clearcoatRoughness: 0.1, side: THREE.DoubleSide
        });
        const innerMat = new THREE.MeshPhysicalMaterial({ color: 0xc0e4ff, metalness: 0.3, roughness: 0.2, transparent: true, opacity: 0.2 });

        // ========== 主烧杯 (大) ==========
        const mainBeaker = new THREE.Group();
        const mainOuter = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.05, 2.0, 48), glassMat);
        mainOuter.castShadow = true;
        mainBeaker.add(mainOuter);
        const mainInner = new THREE.Mesh(new THREE.CylinderGeometry(0.96, 0.96, 1.95, 48), innerMat);
        mainInner.castShadow = true;
        mainBeaker.add(mainInner);
        const mainLiquidGeo = new THREE.CylinderGeometry(0.93, 0.93, 1.55, 48);
        const mainLiquidMat = new THREE.MeshStandardMaterial({ color: 0x4aa3df, emissive: 0x113355, roughness: 0.25 });
        const mainLiquid = new THREE.Mesh(mainLiquidGeo, mainLiquidMat);
        mainLiquid.position.y = -0.05;
        mainLiquid.castShadow = true;
        mainBeaker.add(mainLiquid);
        const rimTop = new THREE.Mesh(new THREE.TorusGeometry(1.06, 0.045, 32, 100), glassMat);
        rimTop.position.y = 0.97; rimTop.rotation.x = Math.PI/2;
        mainBeaker.add(rimTop);
        const rimBottom = new THREE.Mesh(new THREE.TorusGeometry(1.06, 0.045, 32, 100), glassMat);
        rimBottom.position.y = -0.97; rimBottom.rotation.x = Math.PI/2;
        mainBeaker.add(rimBottom);
        mainBeaker.position.set(0, 0.555, 0);
        scene.add(mainBeaker);

        // ========== 小烧杯 (远距离，左前方) ==========
        const smallBeaker = new THREE.Group();
        const smallOuter = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 1.2, 48), glassMat);
        smallOuter.castShadow = true;
        smallBeaker.add(smallOuter);
        const smallInner = new THREE.Mesh(new THREE.CylinderGeometry(0.66, 0.66, 1.16, 48), innerMat);
        smallInner.castShadow = true;
        smallBeaker.add(smallInner);
        const smallLiquidGeo = new THREE.CylinderGeometry(0.64, 0.64, 0.85, 48);
        const smallLiquidMat = new THREE.MeshStandardMaterial({ color: 0x4aa3df, emissive: 0x113355 });
        const smallLiquid = new THREE.Mesh(smallLiquidGeo, smallLiquidMat);
        smallLiquid.position.y = -0.15;
        smallLiquid.castShadow = true;
        smallBeaker.add(smallLiquid);
        const smallRim = new THREE.Mesh(new THREE.TorusGeometry(0.73, 0.04, 32, 80), glassMat);
        smallRim.position.y = 0.55; smallRim.rotation.x = Math.PI/2;
        smallBeaker.add(smallRim);
        const smallRimBottom = new THREE.Mesh(new THREE.TorusGeometry(0.73, 0.04, 32, 80), glassMat);
        smallRimBottom.position.y = -0.55; smallRimBottom.rotation.x = Math.PI/2;
        smallBeaker.add(smallRimBottom);
        smallBeaker.position.set(-2.4, 0.22, 1.2);
        scene.add(smallBeaker);

        const smallLabel = new CSS2DObject(document.createElement('div'));
        smallLabel.element.textContent = '🧪 FeCl₃ 溶解杯';
        smallLabel.element.style.background = 'rgba(0,0,0,0.6)';
        smallLabel.element.style.color = '#ffdd99';
        smallLabel.element.style.padding = '2px 8px';
        smallLabel.element.style.borderRadius = '20px';
        smallLabel.element.style.fontSize = '12px';
        smallLabel.position.set(-2.4, 0.85, 1.2);
        scene.add(smallLabel);

        const mainLabel = new CSS2DObject(document.createElement('div'));
        mainLabel.element.textContent = '💧 去离子水 (200mL)';
        mainLabel.element.style.background = 'rgba(0,0,0,0.6)';
        mainLabel.element.style.color = '#cceeff';
        mainLabel.element.style.padding = '4px 12px';
        mainLabel.element.style.borderRadius = '24px';
        mainLabel.element.style.fontWeight = 'bold';
        mainLabel.element.style.fontSize = '14px';
        mainLabel.position.set(0, 1.55, 0.9);
        scene.add(mainLabel);

        // ========== 加热装置 ==========
        const heaterGroup = new THREE.Group();
        const asbestosDisc = new THREE.Mesh(new THREE.CylinderGeometry(1.28, 1.28, 0.05, 32), new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.7, transparent: true, opacity: 0.85 }));
        asbestosDisc.position.y = -0.52;
        heaterGroup.add(asbestosDisc);
        for (let i = 0; i < 3; i++) {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(1.2 - i*0.15, 0.02, 32, 80), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
            ring.position.y = -0.49; ring.rotation.x = Math.PI/2;
            heaterGroup.add(ring);
        }
        const basePlate = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.12, 1.9), new THREE.MeshStandardMaterial({ color: 0x6a5a4a, metalness: 0.4 }));
        basePlate.position.y = -0.70;
        heaterGroup.add(basePlate);
        const footPos = [[-0.7,-0.76,-0.7],[0.7,-0.76,-0.7],[-0.7,-0.76,0.7],[0.7,-0.76,0.7]];
        footPos.forEach(p => {
            const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,0.08,8), new THREE.MeshStandardMaterial({ color: 0x8a6a4a }));
            foot.position.set(p[0],p[1],p[2]);
            heaterGroup.add(foot);
        });
        const heaterRingMat = new THREE.MeshStandardMaterial({ color: 0xdd6644, metalness: 0.9, emissive: 0x441100 });
        const mainRing = new THREE.Mesh(new THREE.TorusGeometry(1.15, 0.07, 32, 100), heaterRingMat);
        mainRing.position.y = -0.58; mainRing.rotation.x = Math.PI/2;
        heaterGroup.add(mainRing);
        const secondRing = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.05, 32, 100), heaterRingMat);
        secondRing.position.y = -0.60; secondRing.rotation.x = Math.PI/2;
        heaterGroup.add(secondRing);
        for (let i = 0; i < 4; i++) {
            const ang = (i/4)*Math.PI*2;
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.07,0.22,6), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
            pillar.position.set(Math.cos(ang)*1.2, -0.61, Math.sin(ang)*1.2);
            heaterGroup.add(pillar);
        }
        scene.add(heaterGroup);

        // ========== 胶头滴管 ==========
        const dropperModel = new THREE.Group();
        const rubberMat = new THREE.MeshStandardMaterial({ color: 0xaa4c2e, roughness: 0.3, emissive: 0x331100 });
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.24, 32, 32), rubberMat);
        bulb.position.y = 0.44;
        dropperModel.add(bulb);
        for (let i = 0; i < 3; i++) {
            const ridge = new THREE.Mesh(new THREE.TorusGeometry(0.21 + i*0.02, 0.025, 16, 40), new THREE.MeshStandardMaterial({ color: 0x9a3a1e }));
            ridge.position.y = 0.3 - i*0.07; ridge.rotation.x = Math.PI/2;
            dropperModel.add(ridge);
        }
        const glassPipe = new THREE.MeshPhysicalMaterial({ color: 0xcceeff, metalness: 0.9, transparent: true, opacity: 0.75 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.7, 24), glassPipe);
        body.position.y = 0.04;
        dropperModel.add(body);
        const collar = new THREE.Mesh(new THREE.TorusGeometry(0.125, 0.02, 16, 40), new THREE.MeshStandardMaterial({ color: 0xccaa77 }));
        collar.position.y = 0.38; collar.rotation.x = Math.PI/2;
        dropperModel.add(collar);
        const tip = new THREE.Mesh(new THREE.ConeGeometry(0.065, 0.35, 16), new THREE.MeshStandardMaterial({ color: 0xddccaa }));
        tip.position.y = -0.32;
        dropperModel.add(tip);
        const innerDrop = new THREE.Mesh(new THREE.SphereGeometry(0.048, 12), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x552200 }));
        innerDrop.position.y = -0.12;
        dropperModel.add(innerDrop);
        dropperModel.position.set(1.0, 0.7, 0.5);
        dropperModel.rotation.z = -0.2;
        dropperModel.rotation.x = 0.15;
        scene.add(dropperModel);
        dropperModel.visible = false;

        // ========== 气泡系统 ==========
        let bubbleParticles = [];
        let bubbleActive = false;
        const bubbleGeom = new THREE.SphereGeometry(0.035, 14, 14);
        function initBubbles(count = 100) {
            bubbleParticles.forEach(b => scene.remove(b));
            bubbleParticles = [];
            for (let i = 0; i < count; i++) {
                const bubble = new THREE.Mesh(bubbleGeom, new THREE.MeshStandardMaterial({ color: 0xaaffee, emissive: 0x2288aa, transparent: true, opacity: 0.65 }));
                bubble.userData = { speed: 0.007 + Math.random() * 0.018, scale: 0.7 + Math.random() * 0.8 };
                bubble.scale.setScalar(bubble.userData.scale);
                bubble.position.set((Math.random() - 0.5) * 1.4, 0.2 + Math.random() * 1.0, (Math.random() - 0.5) * 1.4);
                scene.add(bubble);
                bubbleParticles.push(bubble);
            }
        }
        initBubbles(95);
        function updateBubbles() {
            if (!bubbleActive) { bubbleParticles.forEach(b => b.visible = false); return; }
            bubbleParticles.forEach(b => {
                b.visible = true;
                b.position.y += b.userData.speed;
                if (b.position.y > 1.45) {
                    b.position.y = 0.1;
                    b.position.x = (Math.random() - 0.5) * 1.35;
                    b.position.z = (Math.random() - 0.5) * 1.35;
                    b.scale.setScalar(0.6 + Math.random() * 0.9);
                }
                b.position.x += (Math.random() - 0.5) * 0.006;
                b.position.z += (Math.random() - 0.5) * 0.006;
                b.position.x = Math.min(Math.max(b.position.x, -1.25), 1.25);
                b.position.z = Math.min(Math.max(b.position.z, -1.25), 1.25);
            });
        }

        // 辅助函数
        function colorLerp(c1, c2, t) {
            return new THREE.Color(c1).lerp(new THREE.Color(c2), t);
        }
        function animateColorChange(mesh, startHex, endHex, duration = 800) {
            return new Promise(resolve => {
                const startTime = performance.now();
                function step(now) {
                    const t = Math.min(1, (now - startTime) / duration);
                    mesh.material.color.set(colorLerp(startHex, endHex, t));
                    if (t < 1) requestAnimationFrame(step);
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }
        function animateMove(obj, targetPos, duration) {
            const startPos = obj.position.clone();
            const startTime = performance.now();
            return new Promise(resolve => {
                function step(now) {
                    const t = Math.min(1, (now - startTime) / duration);
                    obj.position.lerpVectors(startPos, targetPos, t);
                    if (t < 1) requestAnimationFrame(step);
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }

        // 小烧杯液体体积控制
        const smallBottomY = -0.575;
        const initialHeight = 0.85;
        function updateSmallLiquidVolume(dripCountVal) {
            const remaining = Math.max(0, 5 - dripCountVal);
            const newHeight = initialHeight * (remaining / 5);
            if (newHeight <= 0.01) {
                smallLiquid.visible = false;
                return;
            }
            smallLiquid.visible = true;
            const newGeo = new THREE.CylinderGeometry(0.64, 0.64, newHeight, 48);
            smallLiquid.geometry.dispose();
            smallLiquid.geometry = newGeo;
            smallLiquid.position.y = smallBottomY + newHeight / 2;
        }

        // --- 实验状态 ---
        let currentStep = 0;
        let dripCount = 0;
        const colorWater = 0x4aa3df;
        const colorFeCl3 = 0xdcb572;
        const colorFeOH3 = 0xbc5a2c;
        let boilTimer = null; // 煮沸计时器

        function setMainColor(hex) {
            mainLiquid.material.color.setHex(hex);
            if (hex === colorFeOH3) mainLiquid.material.emissive.setHex(0x331100);
            else mainLiquid.material.emissive.setHex(0x113355);
        }
        function setSmallColor(hex) {
            smallLiquid.material.color.setHex(hex);
        }

        function clearBoilTimer() {
            if (boilTimer) {
                if (boilTimer.interval) clearInterval(boilTimer.interval);
                if (boilTimer.timeout) clearTimeout(boilTimer.timeout);
                boilTimer = null;
            }
        }

        async function updateUIForStep(step) {
            const stepDescDiv = document.getElementById('stepDesc');
            const statusSpan = document.getElementById('liquidStatus');
            const nextBtn = document.getElementById('nextBtn');
            
            clearBoilTimer();
            
            if (step === 0) {
                setMainColor(colorWater); setSmallColor(colorWater);
                updateSmallLiquidVolume(0);
                mainLabel.element.textContent = '💧 去离子水 (200mL)';
                bubbleActive = false; heatLight.intensity = 0;
                stepDescDiv.innerHTML = "🧪 准备：在小烧杯中加入0.5g FeCl₃和20mL蒸馏水，点击下一步开始溶解。";
                statusSpan.innerHTML = "⚪ 初始态";
                nextBtn.disabled = false;
            }
            else if (step === 1) {
                await animateColorChange(smallLiquid, colorWater, colorFeCl3, 1000);
                setSmallColor(colorFeCl3);
                mainLabel.element.textContent = '💧 去离子水 (200mL) 待加热';
                bubbleActive = false; heatLight.intensity = 0;
                stepDescDiv.innerHTML = "步骤1：小烧杯中FeCl₃已溶解，得到黄色溶液。下一步将主烧杯中水加热至沸腾。";
                statusSpan.innerHTML = "🟡 FeCl₃ 已溶解";
                nextBtn.disabled = false;
            }
            else if (step === 2) {
                setMainColor(colorWater);
                mainLabel.element.textContent = '🔥 沸水 (沸腾)';
                bubbleActive = true; heatLight.intensity = 0.75;
                stepDescDiv.innerHTML = "步骤2：主烧杯中水已沸腾，可见气泡上升。下一步从小烧杯中吸取FeCl₃溶液滴入沸水。";
                statusSpan.innerHTML = "🔥 沸水";
                nextBtn.disabled = false;
            }
            else if (step === 3) {
                setSmallColor(colorFeCl3);
                let col = 0xe2a745;
                if (dripCount >= 1) col = 0xdc9a4a;
                if (dripCount >= 2) col = 0xd48d3a;
                if (dripCount >= 3) col = 0xcc783a;
                if (dripCount >= 4) col = colorFeOH3;
                setMainColor(col);
                mainLabel.element.textContent = `⚗️ 滴加 FeCl₃ (${dripCount}/5)`;
                bubbleActive = true; heatLight.intensity = 0.95;
                stepDescDiv.innerHTML = "步骤3：胶头滴管从小烧杯吸取FeCl₃溶液，再滴入沸水。点击「手动滴加一滴」模拟完整吸取-滴加过程。";
                statusSpan.innerHTML = "💧 滴加中";
                nextBtn.disabled = (dripCount < 5);
            }
            else if (step === 4) {
                setMainColor(colorFeOH3);
                mainLabel.element.textContent = '🌋 Fe(OH)₃ 溶胶 (煮沸中...)';
                bubbleActive = true; heatLight.intensity = 1.15;
                stepDescDiv.innerHTML = "步骤4：正在煮沸，请等待1-2分钟... <span class='timer-text' id='boilTimerText'>剩余 3 秒</span>";
                statusSpan.innerHTML = "⏳ 煮沸中...";
                nextBtn.disabled = true;
                let timeLeft = 3;
                const timerTextSpan = document.getElementById('boilTimerText');
                const timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timerTextSpan) timerTextSpan.textContent = `剩余 ${timeLeft} 秒`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        if (currentStep === 4) {
                            nextBtn.disabled = false;
                            stepDescDiv.innerHTML = "✅ 煮沸完成！点击下一步完成实验。";
                            statusSpan.innerHTML = "✅ 煮沸完成";
                            mainLabel.element.textContent = '✅ Fe(OH)₃ 溶胶 (煮沸完成)';
                        }
                    }
                }, 1000);
                const timeoutId = setTimeout(() => {}, 3100);
                boilTimer = { interval: timerInterval, timeout: timeoutId };
            }
            else if (step === 5) {
                setMainColor(colorFeOH3);
                mainLabel.element.textContent = '✅ 红棕色氢氧化铁溶胶';
                bubbleActive = false; heatLight.intensity = 0.2;
                stepDescDiv.innerHTML = "✅ 制备完成！得到稳定的红棕色氢氧化铁溶胶。";
                statusSpan.innerHTML = "✅ 溶胶成品";
                nextBtn.disabled = true;
            }
            updateBubblesVisibility();
            dropperModel.visible = (step === 3);
            document.getElementById('prevBtn').disabled = (step <= 0);
            if (step !== 4 && step !== 3 && step !== 5) nextBtn.disabled = false;
        }

        function updateBubblesVisibility() {
            bubbleParticles.forEach(b => b.visible = bubbleActive);
        }

        let transitionLock = false;
        async function nextStep() {
            if (transitionLock) return;
            if (currentStep === 3 && dripCount < 5) {
                alert("请先手动滴加至少完成5次滴加（每次点击都模拟吸取-滴加过程）。");
                return;
            }
            if (currentStep === 4 && document.getElementById('nextBtn').disabled) {
                alert("请等待煮沸完成（约3秒）。");
                return;
            }
            if (currentStep < 5) {
                transitionLock = true;
                currentStep++;
                if (currentStep !== 3) dripCount = (currentStep >= 4) ? 5 : 0;
                await updateUIForStep(currentStep);
                transitionLock = false;
            }
        }
        function prevStep() {
            if (transitionLock) return;
            if (currentStep > 0) {
                transitionLock = true;
                currentStep--;
                if (currentStep < 3) dripCount = 0;
                updateUIForStep(currentStep).then(() => transitionLock = false);
            }
        }
        async function resetExp() {
            if (transitionLock) return;
            transitionLock = true;
            currentStep = 0;
            dripCount = 0;
            setMainColor(colorWater);
            setSmallColor(colorWater);
            updateSmallLiquidVolume(0);
            bubbleActive = false;
            updateBubblesVisibility();
            heatLight.intensity = 0;
            dropperModel.visible = false;
            clearBoilTimer();
            await updateUIForStep(0);
            transitionLock = false;
        }

        async function handleDrip() {
            if (currentStep !== 3) { alert("请先进行到步骤3（滴加阶段）"); return; }
            if (dripCount >= 5) { document.getElementById('stepDesc').innerHTML = "滴加已完成 (5次)，请点击下一步进行煮沸。"; return; }
            await performDripAnimation();
            dripCount++;
            updateSmallLiquidVolume(dripCount);
            if (dripCount === 1) setMainColor(0xe2a745);
            else if (dripCount === 2) setMainColor(0xd88d3a);
            else if (dripCount === 3) setMainColor(0xc77431);
            else if (dripCount >= 4) setMainColor(colorFeOH3);
            mainLabel.element.textContent = `⚗️ 滴加 FeCl₃ (${dripCount}/5)`;
            document.getElementById('stepDesc').innerHTML = `滴加中... (${dripCount}/5) ${dripCount>=5 ? '可进行下一步煮沸' : '继续滴加'}`;
            if (dripCount >= 5) {
                document.getElementById('stepDesc').innerHTML = "✅ 滴加完成！点击下一步进行煮沸。";
                document.getElementById('nextBtn').disabled = false;
            }
        }

        let isAnimating = false;
        async function performDripAnimation() {
            if (isAnimating) return;
            isAnimating = true;
            document.getElementById('dripBtn').disabled = true;
            const startPos = dropperModel.position.clone();
            const targetPosSmall = new THREE.Vector3(-2.4, 0.95, 1.2);
            await animateMove(dropperModel, targetPosSmall, 450);
            const suckDrop = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x552200 }));
            suckDrop.position.set(-2.4, 0.25, 1.2);
            scene.add(suckDrop);
            await animateMove(suckDrop, new THREE.Vector3(-2.4, 0.85, 1.2), 350);
            scene.remove(suckDrop);
            const targetPosMain = new THREE.Vector3(0, 1.75, 0);
            await animateMove(dropperModel, targetPosMain, 550);
            const dropBall = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x552200 }));
            dropBall.position.set(0, 1.75, 0);
            scene.add(dropBall);
            const startTime = performance.now();
            await new Promise(resolve => {
                function animateDrop(now) {
                    const t = Math.min(1, (now - startTime) / 400);
                    const y = 1.75 - t * 1.5;
                    dropBall.position.y = y;
                    if (t < 1) requestAnimationFrame(animateDrop);
                    else { scene.remove(dropBall); resolve(); }
                }
                requestAnimationFrame(animateDrop);
            });
            await animateMove(dropperModel, startPos, 450);
            isAnimating = false;
            document.getElementById('dripBtn').disabled = false;
        }

        document.getElementById('nextBtn').addEventListener('click', nextStep);
        document.getElementById('prevBtn').addEventListener('click', prevStep);
        document.getElementById('resetBtn').addEventListener('click', resetExp);
        document.getElementById('dripBtn').addEventListener('click', handleDrip);

        // UI 步进列表
        const stepsData = [
            { id: 1, name: "小烧杯溶解 FeCl₃" },
            { id: 2, name: "主烧杯加热水至沸腾" },
            { id: 3, name: "滴加 FeCl₃ 溶液" },
            { id: 4, name: "煮沸 1~2 分钟" },
            { id: 5, name: "Fe(OH)₃ 溶胶制成" }
        ];
        const stepContainer = document.getElementById('stepListContainer');
        function buildStepUI() {
            stepContainer.innerHTML = '';
            stepsData.forEach((step, idx) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step-item';
                if (currentStep === idx+1) stepDiv.classList.add('active');
                if (currentStep > idx+1) stepDiv.classList.add('completed');
                stepDiv.innerHTML = `
                    <span class="step-index">${step.id}</span>
                    <span>${step.name}</span>
                    <i class="fas fa-check-circle" style="color:#6feb6f; margin-left:auto; ${currentStep > idx+1 ? '' : 'display:none;'}"></i>
                `;
                stepDiv.addEventListener('click', () => {
                    const target = step.id;
                    if (target === currentStep) return;
                    if (target === currentStep + 1) nextStep();
                    else if (target === currentStep - 1) prevStep();
                    else alert("请按实验顺序逐步操作");
                });
                stepContainer.appendChild(stepDiv);
            });
        }
        function refreshUI() {
            buildStepUI();
        }
        const origUpdate = updateUIForStep;
        window.updateUIForStep = async (step) => {
            await origUpdate(step);
            refreshUI();
        };
        (async () => {
            await updateUIForStep(0);
            refreshUI();
        })();

        // 动画循环
        let timeWave = 0;
        function animateLiquidWave() {
            const intensity = (currentStep === 3 || currentStep === 4) ? 0.09 : 0.02;
            const yOffset = Math.sin(timeWave * 0.008) * intensity * 0.03;
            mainLiquid.position.y = -0.05 + yOffset;
            timeWave++;
        }
        function animateHeatGlow() {
            if (currentStep === 2 || currentStep === 3 || currentStep === 4) {
                const pulse = 0.6 + Math.sin(Date.now() * 0.008) * 0.35;
                heatLight.intensity = pulse;
                mainRing.material.emissiveIntensity = pulse * 0.9;
                secondRing.material.emissiveIntensity = pulse * 0.8;
            } else {
                mainRing.material.emissiveIntensity = 0.1;
                secondRing.material.emissiveIntensity = 0.1;
            }
        }
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateBubbles();
            animateLiquidWave();
            animateHeatGlow();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
