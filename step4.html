<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>U型电泳仪 · 3D装管模拟 | 倾倒 + 滴管加液 + 电极从上口插入 | 左侧导航</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }
        /* 左侧垂直导航面板 */
        .unified-panel {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            max-width: 85%;
            background: rgba(20, 30, 40, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 18px 16px;
            z-index: 30;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            pointer-events: auto;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        @media (max-width: 700px) {
            .unified-panel {
                width: 240px;
                left: 10px;
                padding: 12px;
                gap: 8px;
            }
        }
        .panel-header {
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .panel-title {
            font-weight: bold;
            font-size: 1rem;
            color: #ffde9c;
            letter-spacing: 1px;
        }
        .panel-sub {
            font-size: 0.7rem;
            color: #bbd4f0;
            margin-top: 4px;
        }
        .liquid-data {
            background: rgba(0,0,0,0.45);
            border-radius: 24px;
            padding: 10px 12px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #e0f0ff;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .liquid-data div {
            display: flex;
            justify-content: space-between;
        }
        .liquid-data span {
            font-weight: bold;
            color: #ffb347;
        }
        .steps-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 4px 0;
        }
        .step-btn {
            background: #2c5a6e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            text-align: left;
            white-space: nowrap;
            overflow-x: hidden;
            text-overflow: ellipsis;
        }
        .step-btn.active-step {
            background: #d97706;
            box-shadow: 0 0 10px rgba(217,119,6,0.6);
            border: 1px solid #ffc107;
        }
        .step-btn:active { transform: scale(0.96); }
        .step-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .control-group {
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .ctrl-btn {
            background: #4a6a7a;
            border: none;
            color: white;
            padding: 6px 0;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
            text-align: center;
        }
        .ctrl-btn:active { transform: scale(0.96); }
        .ctrl-btn.reset-btn { background: #7a3a4a; }
        .status-tip {
            background: #0f1a22;
            border-radius: 24px;
            padding: 8px 10px;
            text-align: center;
            font-size: 0.7rem;
            color: #e6f7ff;
            font-family: monospace;
            border-left: 3px solid #ffb347;
            line-height: 1.3;
        }
        .mouse-tip {
            font-size: 0.65rem;
            text-align: center;
            color: #aaccee;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 8px;
            margin-top: 4px;
        }
        /* 隐藏旧元素 */
        #info, .step-panel, .status-liquid, .next-hint, .note {
            display: none;
        }
    </style>
</head>
<body>
    <div id="unifiedPanel" class="unified-panel">
        <div class="panel-header">
            <div class="panel-title">⚡ U型电泳仪</div>
            <div class="panel-sub">ζ电位测定 | 3D装管模拟</div>
        </div>
        <div class="liquid-data" id="liquidData">
            <div>📊 溶胶高度: <span id="solHeightVal">--</span> cm</div>
            <div>💧 辅助液高度: <span id="auxHeightVal">--</span> cm</div>
            <div>🔘 活塞状态: <span id="pistonStateVal">关闭</span></div>
        </div>
        <div class="steps-area" id="stepsArea"></div>
        <div class="control-group">
            <button id="prevStepBtn" class="ctrl-btn">◀ 上一步</button>
            <button id="nextStepBtn" class="ctrl-btn">下一步 ▶</button>
            <button id="resetBtn" class="ctrl-btn reset-btn">🔄 重置</button>
        </div>
        <div class="status-tip" id="statusTip">📍 点击【步骤1】或【下一步】开始</div>
        <div class="mouse-tip">🖱️ 拖拽旋转 | 右键平移 | 滚动缩放<br>步骤6:电极从上口垂直插入</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xb8d4f0);
        scene.fog = new THREE.FogExp2(0xb8d4f0, 0.006);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 3.4, 6.2);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.minDistance = 3.5;
        controls.maxDistance = 14;
        controls.target.set(0, 1.2, 0);
        
        // 灯光
        const ambientLight = new THREE.AmbientLight(0x6c8cac, 0.58);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff2e0, 1.2);
        mainLight.position.set(3.2, 5.2, 2.8);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x8aaccc, 0.55);
        fillLight.position.set(-1.8, 2.2, 2.2);
        scene.add(fillLight);
        const backFill = new THREE.PointLight(0xffbb88, 0.5);
        backFill.position.set(1.4, 1.6, -3.0);
        scene.add(backFill);
        const rimLight = new THREE.PointLight(0xcceeff, 0.6);
        rimLight.position.set(2.2, 2.5, -3.2);
        scene.add(rimLight);
        
        // 实验台
        function createLabTable() {
            const group = new THREE.Group();
            const topMat = new THREE.MeshStandardMaterial({ color: 0xc8a27a, roughness: 0.62 });
            const tableTop = new THREE.Mesh(new THREE.BoxGeometry(7.5, 0.18, 6.4), topMat);
            tableTop.position.y = -2.15;
            tableTop.receiveShadow = true;
            tableTop.castShadow = true;
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8b5a3c });
            const positions = [[-2.9, -2.48, -2.4], [2.9, -2.48, -2.4], [-2.9, -2.48, 2.4], [2.9, -2.48, 2.4]];
            positions.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.4), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            group.add(tableTop);
            return group;
        }
        scene.add(createLabTable());
        const tableSurfaceY = -2.06; 

        // 烧杯模型
        function createBeaker(x, z, liquidColorHex, liquidOpacity, labelText, colorHint) {
            const group = new THREE.Group();
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0xd4ecff, metalness: 0.88, roughness: 0.18, transparent: true, opacity: 0.52, clearcoat: 0.98
            });
            const bodyGeo = new THREE.CylinderGeometry(0.47, 0.39, 0.72, 56);
            const body = new THREE.Mesh(bodyGeo, glassMat);
            body.castShadow = true;
            body.position.y = 0.36;
            group.add(body);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, metalness: 0.75 });
            const rimGeo = new THREE.TorusGeometry(0.46, 0.048, 36, 90);
            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.rotation.x = Math.PI / 2;
            rim.position.y = 0.72;
            group.add(rim);
            const liquidHeight = 0.56;
            const liquidGeo = new THREE.CylinderGeometry(0.395, 0.395, liquidHeight, 48);
            const liquidMat = new THREE.MeshPhysicalMaterial({
                color: liquidColorHex, metalness: 0.15, roughness: 0.28, transparent: true,
                opacity: liquidOpacity, emissive: liquidColorHex, emissiveIntensity: 0.1
            });
            const liquid = new THREE.Mesh(liquidGeo, liquidMat);
            liquid.position.y = 0.36 - (0.72/2) + liquidHeight/2 + 0.02;
            group.add(liquid);
            group.position.set(x, tableSurfaceY, z);
            return { group, liquid, liquidMat, originalPos: new THREE.Vector3(x, tableSurfaceY, z) };
        }
        
        const solBeaker = createBeaker(-1.85, 1.5, 0xcd7542, 0.88, "Fe(OH)₃", 0xcd7a42);
        const auxBeaker = createBeaker(1.75, 1.55, 0x6ca3d4, 0.82, "辅助液", 0x6ca3d4);
        scene.add(solBeaker.group);
        scene.add(auxBeaker.group);
        
        const shadowMatDisc = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.92 });
        const solShadow = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.04, 18), shadowMatDisc);
        solShadow.position.set(-1.85, tableSurfaceY - 0.03, 1.5);
        solShadow.receiveShadow = true;
        const auxShadow = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.04, 18), shadowMatDisc);
        auxShadow.position.set(1.75, tableSurfaceY - 0.03, 1.55);
        auxShadow.receiveShadow = true;
        scene.add(solShadow, auxShadow);
        
        function addBeakerLabel(text, posOffset, colorHex) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.cssText = `background:rgba(16,28,40,0.85); color:${colorHex}; padding:4px 12px; border-radius:28px; font-size:11px; font-weight:bold; backdrop-filter:blur(8px); border-left:3px solid ${colorHex}; pointer-events:none;`;
            const label = new CSS2DObject(div);
            label.position.copy(posOffset);
            scene.add(label);
            return label;
        }
        const solLabel = addBeakerLabel("🧪 Fe(OH)₃ 溶胶 (足量)", new THREE.Vector3(-1.85, -1.38, 1.65), "#ffaa77");
        const auxLabel = addBeakerLabel("💧 辅助液 (足量)", new THREE.Vector3(1.75, -1.38, 1.72), "#88ccff");
        
        // ========== U型玻璃仪器主体 ==========
        const glassGroup = new THREE.Group();
        scene.add(glassGroup);
        const tubeHeight = 2.28, tubeBottomY = -0.29, tubeCenterY = 0.85, leftX = -1.08, rightX = 0.72;
        function makeTube(x, yCenter, radius) {
            const geo = new THREE.CylinderGeometry(radius, radius, tubeHeight, 52);
            const mat = new THREE.MeshPhysicalMaterial({ color: 0xc6e2ff, metalness: 0.93, roughness: 0.16, transparent: true, opacity: 0.6 });
            const tube = new THREE.Mesh(geo, mat);
            tube.position.set(x, yCenter, 0);
            tube.castShadow = true;
            const edges = new THREE.EdgesGeometry(geo);
            const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x9ac0e6 }));
            tube.add(wire);
            return tube;
        }
        const leftTube = makeTube(leftX, tubeCenterY, 0.29);
        const rightTube = makeTube(rightX, tubeCenterY, 0.29);
        glassGroup.add(leftTube, rightTube);
        
        const curvePoints = [new THREE.Vector3(leftX, tubeBottomY, 0), new THREE.Vector3(-0.62, tubeBottomY-0.12, 0), new THREE.Vector3(0, tubeBottomY-0.29, 0), new THREE.Vector3(0.62, tubeBottomY-0.12, 0), new THREE.Vector3(rightX, tubeBottomY, 0)];
        const curveGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(curvePoints), 70, 0.148, 24, false);
        const uTube = new THREE.Mesh(curveGeo, new THREE.MeshPhysicalMaterial({ color: 0xbcdaff, metalness: 0.9, transparent: true, opacity: 0.62 }));
        glassGroup.add(uTube);
        
        const extraPoints = [new THREE.Vector3(0, -1.65, 0), new THREE.Vector3(0.5, -1.7, 0), new THREE.Vector3(1.0, -1.55, 0), new THREE.Vector3(1.45, -1.2, 0), new THREE.Vector3(1.65, -0.45, 0)];
        const extraTubeGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(extraPoints), 48, 0.105, 16, false);
        const extraTubeMat = new THREE.MeshPhysicalMaterial({ color: 0xaad0fa, metalness: 0.88, roughness: 0.25, transparent: true, opacity: 0.62 });
        const extraTube = new THREE.Mesh(extraTubeGeo, extraTubeMat);
        glassGroup.add(extraTube);
        
        const upperConnector = new THREE.Mesh(new THREE.CylinderGeometry(0.165, 0.165, 1.15, 28), new THREE.MeshPhysicalMaterial({ color: 0xb8d4ff, transparent: true, opacity: 0.58 }));
        upperConnector.position.set(0, -0.92, 0);
        glassGroup.add(upperConnector);
        const pistonBody = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.44, 34), new THREE.MeshStandardMaterial({ color: 0xeef4ee, roughness: 0.45 }));
        pistonBody.position.set(0, -1.51, 0);
        const pistonHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.4, 20), new THREE.MeshStandardMaterial({ color: 0xe2ece2 }));
        pistonHandle.position.set(0, -1.28, 0);
        glassGroup.add(pistonBody, pistonHandle);
        
        const funnelSphere = new THREE.Mesh(new THREE.SphereGeometry(0.41, 72, 72), new THREE.MeshPhysicalMaterial({ color: 0xd0ecff, transparent: true, opacity: 0.65 }));
        funnelSphere.position.set(1.68, 1.58, 0);
        glassGroup.add(funnelSphere);
        const glassRing = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.048, 36, 72), new THREE.MeshPhysicalMaterial({ color: 0xd8f0ff, transparent: true }));
        glassRing.position.set(1.68, 1.98, 0);
        glassRing.rotation.x = Math.PI/2;
        glassGroup.add(glassRing);
        const funnelNeck = new THREE.Mesh(new THREE.CylinderGeometry(0.125, 0.125, 1.85, 30), new THREE.MeshPhysicalMaterial({ color: 0xc0dcff, transparent: true, opacity: 0.6 }));
        funnelNeck.position.set(1.68, 0.26, 0);
        glassGroup.add(funnelNeck);
        
        // 电极独立于玻璃组，初始放置在操作台上
        const electrodeMat = new THREE.MeshStandardMaterial({ color: 0xe8eef4, metalness: 0.95 });
        const leftElectrode = new THREE.Mesh(new THREE.CylinderGeometry(0.108, 0.108, 1.62, 28), electrodeMat);
        const rightElectrode = new THREE.Mesh(new THREE.CylinderGeometry(0.108, 0.108, 1.62, 28), electrodeMat);
        scene.add(leftElectrode);
        scene.add(rightElectrode);
        
        // 初始位置：操作台上，右侧辅助液烧杯旁边
        const initLeftPos = new THREE.Vector3(-1.2, -1.65, 1.8);
        const initRightPos = new THREE.Vector3(1.2, -1.65, 1.8);
        leftElectrode.position.copy(initLeftPos);
        rightElectrode.position.copy(initRightPos);
        leftElectrode.rotation.z = 0;
        rightElectrode.rotation.z = 0;
        
        // 目标位置：管口露出位置（最终Y=0.55）
        const targetLeftPos = new THREE.Vector3(leftX, 0.55, 0);
        const targetRightPos = new THREE.Vector3(rightX, 0.55, 0);
        // 上方预备位置（用于垂直插入）
        const aboveLeftPos = new THREE.Vector3(leftX, 1.6, 0);
        const aboveRightPos = new THREE.Vector3(rightX, 1.6, 0);
        
        function addScaleMarks(xPos, isLeft) {
            const markMat = new THREE.MeshStandardMaterial({ color: 0x2c4c6e });
            const startY = tubeBottomY;
            const stepY = tubeHeight / 16;
            const zOff = isLeft ? -0.31 : 0.31;
            for (let i = 0; i <= 16; i++) {
                const y = startY + i * stepY;
                const len = (i % 4 === 0) ? 0.2 : 0.1;
                const mark = new THREE.Mesh(new THREE.BoxGeometry(len, 0.022, 0.012), markMat);
                mark.position.set(xPos, y, zOff);
                glassGroup.add(mark);
            }
        }
        addScaleMarks(leftX, true); addScaleMarks(rightX, false);
        
        function addLabel(text, pos, bg = 'rgba(30,45,65,0.8)') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.cssText = `color:#f0f5fc; background:${bg}; font-size:11px; padding:3px 10px; border-radius:24px; backdrop-filter:blur(5px); font-weight:500;`;
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            scene.add(label);
        }
        addLabel('球形漏斗 (加液口)', new THREE.Vector3(2.05, 2.22, 0.35), 'rgba(55,80,105,0.8)');
        addLabel('活塞 (PTFE)', new THREE.Vector3(0.6, -1.48, 0.5));
        addLabel('左电极 (铂)', new THREE.Vector3(-1.42, 0.48, 0.42));
        addLabel('右电极 (铂)', new THREE.Vector3(1.08, 0.48, 0.42));
        
        // ========== 胶头滴管模型 ==========
        function createDropper() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xcceeff, metalness: 0.85, roughness: 0.2, transparent: true, opacity: 0.7 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.04, 0.48, 12), bodyMat);
            body.position.y = 0;
            group.add(body);
            const rubberMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.65 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.085, 16, 16), rubberMat);
            head.position.y = 0.26;
            group.add(head);
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.085, 0.1, 8), rubberMat);
            neck.position.y = 0.185;
            group.add(neck);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xccaa88 });
            const tip = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.12, 8), tipMat);
            tip.position.y = -0.28;
            group.add(tip);
            return group;
        }
        
        const dropper1 = createDropper();
        const dropper2 = createDropper();
        scene.add(dropper1);
        scene.add(dropper2);
        dropper1.position.set(2.2, -1.55, 2.0);
        dropper2.position.set(2.5, -1.55, 1.9);
        dropper1.rotation.z = -0.3;
        dropper2.rotation.z = -0.2;
        
        const leftPortPos = new THREE.Vector3(leftX, 1.33, 0.15);
        const rightPortPos = new THREE.Vector3(rightX, 1.33, 0.15);
        const leftDropTarget = new THREE.Vector3(leftX, 1.38, 0.15);
        const rightDropTarget = new THREE.Vector3(rightX, 1.38, 0.15);
        
        // ========== 液体系统 ==========
        let leftSolMesh = null, leftAuxMesh = null, rightSolMesh = null, rightAuxMesh = null;
        let solHeightCm = 0, totalHeightCm = 0;
        let pistonOpen = false;
        const cmToY = (cm) => tubeBottomY + (cm / 16) * tubeHeight;
        function createLiquidMaterial(color, opacity) {
            return new THREE.MeshPhysicalMaterial({ color, metalness: 0.08, roughness: 0.32, transparent: true, opacity, emissive: color, emissiveIntensity: 0.07 });
        }
        function rebuildLiquids() {
            if (leftSolMesh) glassGroup.remove(leftSolMesh);
            if (leftAuxMesh) glassGroup.remove(leftAuxMesh);
            if (rightSolMesh) glassGroup.remove(rightSolMesh);
            if (rightAuxMesh) glassGroup.remove(rightAuxMesh);
            const radiusLiquid = 0.248;
            const bottomY = tubeBottomY;
            const solTopY = cmToY(solHeightCm);
            const solHeightActual = Math.max(0, solTopY - bottomY);
            if (solHeightActual > 0.02 && solHeightCm > 0) {
                const solGeo = new THREE.CylinderGeometry(radiusLiquid, radiusLiquid, solHeightActual, 40);
                const solMat = createLiquidMaterial(0xb55a2c, 0.84);
                leftSolMesh = new THREE.Mesh(solGeo, solMat);
                leftSolMesh.position.set(leftX, bottomY + solHeightActual/2, 0);
                glassGroup.add(leftSolMesh);
                rightSolMesh = new THREE.Mesh(solGeo.clone(), solMat);
                rightSolMesh.position.set(rightX, bottomY + solHeightActual/2, 0);
                glassGroup.add(rightSolMesh);
            }
            const auxTopY = cmToY(totalHeightCm);
            const auxBottomY = cmToY(solHeightCm);
            const auxHeight = Math.max(0, auxTopY - auxBottomY);
            if (auxHeight > 0.02 && totalHeightCm > solHeightCm && solHeightCm > 0) {
                const auxGeo = new THREE.CylinderGeometry(radiusLiquid, radiusLiquid, auxHeight, 40);
                const auxMat = createLiquidMaterial(0x8bbce6, 0.68);
                leftAuxMesh = new THREE.Mesh(auxGeo, auxMat);
                leftAuxMesh.position.set(leftX, auxBottomY + auxHeight/2, 0);
                glassGroup.add(leftAuxMesh);
                rightAuxMesh = new THREE.Mesh(auxGeo, auxMat);
                rightAuxMesh.position.set(rightX, auxBottomY + auxHeight/2, 0);
                glassGroup.add(rightAuxMesh);
            }
            document.getElementById('solHeightVal').innerText = solHeightCm.toFixed(1);
            document.getElementById('auxHeightVal').innerText = (totalHeightCm - solHeightCm).toFixed(1);
            document.getElementById('pistonStateVal').innerText = pistonOpen ? "开启 ✅" : "关闭 ⚪";
        }
        function updatePistonVisual() {
            if (pistonOpen) {
                pistonBody.material.emissive = new THREE.Color(0xffaa55);
                pistonBody.material.emissiveIntensity = 0.48;
                pistonHandle.material.emissive = new THREE.Color(0xffaa55);
                if (!window.pistonLight) {
                    window.pistonLight = new THREE.PointLight(0xffaa66, 0.85, 3.8);
                    window.pistonLight.position.set(0, -1.3, 0.45);
                    scene.add(window.pistonLight);
                } else window.pistonLight.intensity = 0.75;
            } else {
                pistonBody.material.emissiveIntensity = 0;
                pistonHandle.material.emissiveIntensity = 0;
                if (window.pistonLight) window.pistonLight.intensity = 0;
            }
        }
        
        // 动画辅助函数
        let isAnimating = false;
        let animFrameId = null;
        
        function createDropletParticles(startPos, endPos, duration = 300, color = 0x6ca3d4) {
            const count = 20;
            const group = new THREE.Group();
            const particles = [];
            for (let i = 0; i < count; i++) {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.012, 5, 5), new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4 }));
                sphere.userData = { progress: Math.random() };
                sphere.position.copy(startPos);
                group.add(sphere);
                particles.push(sphere);
            }
            scene.add(group);
            const startTime = performance.now();
            function animateParticles() {
                const now = performance.now();
                const elapsed = now - startTime;
                if (elapsed >= duration) {
                    scene.remove(group);
                    return;
                }
                const t = elapsed / duration;
                particles.forEach(p => {
                    const offset = p.userData.progress * 0.4;
                    const factor = Math.min(1, t + offset);
                    const pos = new THREE.Vector3().lerpVectors(startPos, endPos, factor);
                    p.position.copy(pos);
                    p.scale.setScalar(0.7 + Math.sin(factor * Math.PI) * 0.5);
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
        
        function animateDropper(dropper, startPos, endPos, targetPourPos, onComplete) {
            const originalPos = dropper.position.clone();
            const originalRot = dropper.rotation.clone();
            const midPos = startPos.clone().lerp(endPos, 0.5);
            midPos.y += 0.2;
            let progress = 0;
            const duration = 800;
            const startTime = performance.now();
            function step(now) {
                const elapsed = now - startTime;
                progress = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - progress, 2);
                if (progress < 0.4) {
                    const t2 = progress / 0.4;
                    const p = new THREE.Vector3().lerpVectors(startPos, midPos, t2);
                    dropper.position.copy(p);
                    dropper.rotation.z = -0.3 * (1 - t2);
                } else if (progress < 0.7) {
                    const t2 = (progress - 0.4) / 0.3;
                    const p = new THREE.Vector3().lerpVectors(midPos, endPos, t2);
                    dropper.position.copy(p);
                    dropper.rotation.z = -0.3 + t2 * 0.8;
                } else {
                    if (progress >= 0.7 && !window.dropletTriggered) {
                        window.dropletTriggered = true;
                        createDropletParticles(endPos, targetPourPos, 350, 0x6ca3d4);
                    }
                    dropper.position.copy(endPos);
                    dropper.rotation.z = 0.5;
                    if (progress >= 0.9) {
                        const returnStart = performance.now();
                        function returnStep(retTime) {
                            const retElapsed = retTime - returnStart;
                            let retProgress = Math.min(1, retElapsed / 500);
                            const retEase = 1 - Math.pow(1 - retProgress, 2);
                            dropper.position.lerpVectors(endPos, originalPos, retEase);
                            dropper.rotation.z = 0.5 * (1 - retEase) + originalRot.z * retEase;
                            if (retProgress >= 1) {
                                dropper.position.copy(originalPos);
                                dropper.rotation.copy(originalRot);
                                if (onComplete) onComplete();
                                cancelAnimationFrame(returnFrame);
                            } else {
                                returnFrame = requestAnimationFrame(returnStep);
                            }
                        }
                        let returnFrame = requestAnimationFrame(returnStep);
                        cancelAnimationFrame(animFrameId);
                        return;
                    }
                }
                animFrameId = requestAnimationFrame(step);
            }
            window.dropletTriggered = false;
            animFrameId = requestAnimationFrame(step);
        }
        
        function startDropperSequence(onComplete) {
            if (isAnimating) return;
            isAnimating = true;
            const btns = document.querySelectorAll('.step-btn, .ctrl-btn');
            btns.forEach(btn => btn.disabled = true);
            const oldInt = auxBeaker.liquidMat.emissiveIntensity;
            auxBeaker.liquidMat.emissiveIntensity = 0.7;
            setTimeout(() => { if(auxBeaker.liquidMat) auxBeaker.liquidMat.emissiveIntensity = oldInt; }, 1500);
            
            const startPos1 = dropper1.position.clone();
            const endPos1 = new THREE.Vector3(leftPortPos.x, leftPortPos.y + 0.25, leftPortPos.z - 0.1);
            animateDropper(dropper1, startPos1, endPos1, leftDropTarget, () => {
                const startPos2 = dropper2.position.clone();
                const endPos2 = new THREE.Vector3(rightPortPos.x, rightPortPos.y + 0.25, rightPortPos.z - 0.1);
                animateDropper(dropper2, startPos2, endPos2, rightDropTarget, () => {
                    isAnimating = false;
                    btns.forEach(btn => btn.disabled = false);
                    if (onComplete) onComplete();
                });
            });
        }
        
        // 倾倒动画
        function startPourAnimation(onComplete) {
            if (isAnimating) return;
            isAnimating = true;
            const btns = document.querySelectorAll('.step-btn, .ctrl-btn');
            btns.forEach(btn => btn.disabled = true);
            
            const beakerGroup = solBeaker.group;
            const originalPos = solBeaker.originalPos.clone();
            const targetPos = new THREE.Vector3(1.68, 1.92, 0.15);
            const startQuat = beakerGroup.quaternion.clone();
            const endQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(-0.55, 0.2, 0.1, 'XYZ'));
            
            solShadow.visible = false;
            solLabel.visible = false;
            
            let progress = 0;
            const duration = 650;
            const startTime = performance.now();
            
            function step(now) {
                const elapsed = now - startTime;
                progress = Math.min(1, elapsed / duration);
                const ease = 1 - Math.pow(1 - progress, 2);
                const currentPos = new THREE.Vector3().lerpVectors(originalPos, targetPos, ease);
                beakerGroup.position.copy(currentPos);
                if (progress < 0.7) {
                    const rotEase = progress / 0.7;
                    const intermediate = new THREE.Quaternion().setFromEuler(new THREE.Euler(-0.2 * rotEase, 0.1 * rotEase, 0));
                    THREE.Quaternion.slerp(startQuat, intermediate, beakerGroup.quaternion, rotEase);
                } else {
                    const tiltEase = (progress - 0.7) / 0.3;
                    THREE.Quaternion.slerp(beakerGroup.quaternion, endQuat, beakerGroup.quaternion, tiltEase);
                }
                if (progress >= 1) {
                    const pourStart = new THREE.Vector3(1.68, 2.05, 0.1);
                    const pourEnd = new THREE.Vector3(1.68, 1.75, 0);
                    createDropletParticles(pourStart, pourEnd, 450, 0xcd7a42);
                    setTimeout(() => {
                        solHeightCm = 4.65;
                        totalHeightCm = solHeightCm;
                        rebuildLiquids();
                        const origIntensity = solBeaker.liquidMat.emissiveIntensity;
                        solBeaker.liquidMat.emissiveIntensity = 0.7;
                        setTimeout(() => { if(solBeaker.liquidMat) solBeaker.liquidMat.emissiveIntensity = origIntensity; }, 500);
                        const returnDuration = 500;
                        const returnStartTime = performance.now();
                        const returnStartPos = beakerGroup.position.clone();
                        const returnStartQuat = beakerGroup.quaternion.clone();
                        function returnStep(nowTime) {
                            const retElapsed = nowTime - returnStartTime;
                            let retProgress = Math.min(1, retElapsed / returnDuration);
                            const retEase = 1 - Math.pow(1 - retProgress, 2);
                            beakerGroup.position.lerpVectors(returnStartPos, originalPos, retEase);
                            THREE.Quaternion.slerp(returnStartQuat, startQuat, beakerGroup.quaternion, retEase);
                            if (retProgress >= 1) {
                                beakerGroup.position.copy(originalPos);
                                beakerGroup.quaternion.copy(startQuat);
                                solShadow.visible = true;
                                solLabel.visible = true;
                                isAnimating = false;
                                btns.forEach(btn => btn.disabled = false);
                                if (onComplete) onComplete();
                                cancelAnimationFrame(returnFrame);
                            } else {
                                returnFrame = requestAnimationFrame(returnStep);
                            }
                        }
                        let returnFrame = requestAnimationFrame(returnStep);
                    }, 100);
                    cancelAnimationFrame(animFrameId);
                    return;
                }
                animFrameId = requestAnimationFrame(step);
            }
            animFrameId = requestAnimationFrame(step);
        }
        
        // 电极插入动画：先快速移动到管口正上方，再垂直下降插入
        function startElectrodeInsertAnimation(onComplete) {
            if (isAnimating) return;
            isAnimating = true;
            const btns = document.querySelectorAll('.step-btn, .ctrl-btn');
            btns.forEach(btn => btn.disabled = true);
            
            const startLeftPos = leftElectrode.position.clone();
            const startRightPos = rightElectrode.position.clone();
            const startLeftRot = leftElectrode.rotation.clone();
            const startRightRot = rightElectrode.rotation.clone();
            const targetRot = new THREE.Euler(0, 0, 0);
            
            const moveDuration = 300;
            const moveStart = performance.now();
            
            function movePhase(now) {
                const elapsed = now - moveStart;
                let t = Math.min(1, elapsed / moveDuration);
                const ease = 1 - Math.pow(1 - t, 2);
                leftElectrode.position.lerpVectors(startLeftPos, aboveLeftPos, ease);
                rightElectrode.position.lerpVectors(startRightPos, aboveRightPos, ease);
                leftElectrode.rotation.x = startLeftRot.x * (1 - ease) + targetRot.x * ease;
                leftElectrode.rotation.z = startLeftRot.z * (1 - ease) + targetRot.z * ease;
                rightElectrode.rotation.x = startRightRot.x * (1 - ease) + targetRot.x * ease;
                rightElectrode.rotation.z = startRightRot.z * (1 - ease) + targetRot.z * ease;
                
                if (t >= 1) {
                    leftElectrode.position.copy(aboveLeftPos);
                    rightElectrode.position.copy(aboveRightPos);
                    leftElectrode.rotation.copy(targetRot);
                    rightElectrode.rotation.copy(targetRot);
                    const downDuration = 500;
                    const downStart = performance.now();
                    function downPhase(nowTime) {
                        const downElapsed = nowTime - downStart;
                        let t2 = Math.min(1, downElapsed / downDuration);
                        const ease2 = 1 - Math.pow(1 - t2, 2);
                        const leftY = aboveLeftPos.y - (aboveLeftPos.y - targetLeftPos.y) * ease2;
                        const rightY = aboveRightPos.y - (aboveRightPos.y - targetRightPos.y) * ease2;
                        leftElectrode.position.y = leftY;
                        rightElectrode.position.y = rightY;
                        if (t2 >= 1) {
                            leftElectrode.position.copy(targetLeftPos);
                            rightElectrode.position.copy(targetRightPos);
                            leftElectrode.material.emissive = new THREE.Color(0x88aaff);
                            rightElectrode.material.emissive = new THREE.Color(0x88aaff);
                            leftElectrode.material.emissiveIntensity = 0.55;
                            rightElectrode.material.emissiveIntensity = 0.55;
                            setTimeout(() => {
                                if(leftElectrode.material) leftElectrode.material.emissiveIntensity = 0.2;
                                if(rightElectrode.material) rightElectrode.material.emissiveIntensity = 0.2;
                            }, 900);
                            isAnimating = false;
                            btns.forEach(btn => btn.disabled = false);
                            if (onComplete) onComplete();
                            cancelAnimationFrame(downFrame);
                        } else {
                            downFrame = requestAnimationFrame(downPhase);
                        }
                    }
                    let downFrame = requestAnimationFrame(downPhase);
                    cancelAnimationFrame(moveFrame);
                } else {
                    moveFrame = requestAnimationFrame(movePhase);
                }
            }
            let moveFrame = requestAnimationFrame(movePhase);
        }
        
        // 重置电极到操作台
        function resetElectrodes() {
            leftElectrode.position.copy(initLeftPos);
            rightElectrode.position.copy(initRightPos);
            leftElectrode.rotation.set(0, 0, 0);
            rightElectrode.rotation.set(0, 0, 0);
            leftElectrode.material.emissiveIntensity = 0;
            rightElectrode.material.emissiveIntensity = 0;
        }
        
        // 步骤逻辑
        let currentStep = 0;
        
        function step1_clean() { if(isAnimating) return; resetExperiment(); updateUIForStep(1, '✅ 步骤1: 清洗·烘干·活塞涂凡士林 (仪器已备好)'); currentStep = 1; }
        function step2_openPiston() {
            if(isAnimating) return;
            if (solHeightCm > 0.1) { if(confirm("已有液体，重置后再开启活塞？")) resetExperiment(); else return; }
            pistonOpen = true;
            updatePistonVisual();
            rebuildLiquids();
            updateUIForStep(2, '🔓 步骤2: 活塞已开启 (连通U型管，可注入溶胶)');
            currentStep = 2;
        }
        function step3_addSol() {
            if(isAnimating) { alert("倾倒动画进行中，请稍后..."); return; }
            if (!pistonOpen) { alert("请先执行【步骤2: 打开活塞】再加入溶胶。"); return; }
            if (solHeightCm > 0.2) { if(!confirm("溶胶已存在，是否重置并重新倾倒？")) return; resetExperiment(); pistonOpen = true; updatePistonVisual(); rebuildLiquids(); }
            startPourAnimation(() => {
                if (solHeightCm < 0.1) {
                    solHeightCm = 4.65;
                    totalHeightCm = solHeightCm;
                    rebuildLiquids();
                }
                updateUIForStep(3, '🧪 步骤3: Fe(OH)₃溶胶通过倾倒加入，液面约4.7cm');
                currentStep = 3;
            });
        }
        function step4_closePiston() {
            if(isAnimating) return;
            if (solHeightCm <= 0.2) { alert("请先加入溶胶（步骤3）再关闭活塞。"); return; }
            pistonOpen = false;
            updatePistonVisual();
            rebuildLiquids();
            updateUIForStep(4, '🔒 步骤4: 活塞已关闭，可滴加辅助液');
            currentStep = 4;
        }
        function step5_addAuxAndDropper() {
            if(isAnimating) return;
            if (pistonOpen) { alert("请先关闭活塞（步骤4）再进行滴加辅助液。"); return; }
            if (solHeightCm < 0.5) { alert("尚未加入溶胶，请先执行步骤3。"); return; }
            totalHeightCm = 10.0;
            if (totalHeightCm <= solHeightCm) totalHeightCm = solHeightCm + 1.8;
            rebuildLiquids();
            updateUIForStep(5, '💧 步骤5: 辅助液已注入，现用滴管补充至左右管口...');
            const oldInt = auxBeaker.liquidMat.emissiveIntensity;
            auxBeaker.liquidMat.emissiveIntensity = 0.7;
            setTimeout(() => { if(auxBeaker.liquidMat) auxBeaker.liquidMat.emissiveIntensity = oldInt; }, 1500);
            startDropperSequence(() => {
                updateUIForStep(5, '✅ 步骤5: 辅助液滴加完成，左侧管口与右侧电极管口已加液');
                currentStep = 5;
            });
        }
        function step6_electrodeInsert() {
            if(isAnimating) return;
            if (solHeightCm < 0.5) { alert("请先完成前序步骤。"); return; }
            updateUIForStep(6, '⚡ 步骤6: 电极从操作台移动到管口上方，然后垂直插入...');
            startElectrodeInsertAnimation(() => {
                updateUIForStep(6, '⚡ 步骤6: 铂电极已从上口插入，顶端露出管口，实验装管完成');
                currentStep = 6;
            });
        }
        function resetExperiment() {
            if(isAnimating) return;
            solHeightCm = 0; totalHeightCm = 0; pistonOpen = false;
            updatePistonVisual();
            rebuildLiquids();
            resetElectrodes();
            updateUIForStep(0, '🔄 已重置 · 初始状态 (无液体，活塞关闭，电极在操作台上)');
            currentStep = 0;
        }
        
        function updateUIForStep(stepNum, message) {
            document.getElementById('statusTip').innerHTML = message;
            const stepBtns = document.querySelectorAll('.step-btn');
            stepBtns.forEach((btn, idx) => {
                if (idx + 1 === stepNum) btn.classList.add('active-step');
                else btn.classList.remove('active-step');
            });
        }
        
        function nextStep() {
            if (isAnimating) { alert("动画进行中，请稍后..."); return; }
            if (currentStep < 6) {
                const stepFuncs = [null, step1_clean, step2_openPiston, step3_addSol, step4_closePiston, step5_addAuxAndDropper, step6_electrodeInsert];
                stepFuncs[currentStep + 1]();
            } else {
                alert("已完成所有步骤！");
            }
        }
        function prevStep() {
            if (isAnimating) { alert("动画进行中，请稍后..."); return; }
            if (currentStep > 1) {
                const stepFuncs = [null, step1_clean, step2_openPiston, step3_addSol, step4_closePiston, step5_addAuxAndDropper, step6_electrodeInsert];
                stepFuncs[currentStep - 1]();
            } else if (currentStep === 1) {
                resetExperiment();
            } else {
                alert("已是第一步，无法上一步。");
            }
        }
        
        // 创建步骤按钮
        const stepsArea = document.getElementById('stepsArea');
        const stepTitles = ['1.清洗/涂凡士林', '2.打开活塞', '3.加Fe(OH)₃溶胶', '4.关闭活塞', '5.滴加辅助液', '6.插入电极'];
        stepTitles.forEach((title, idx) => {
            const btn = document.createElement('button');
            btn.className = 'step-btn';
            btn.textContent = title;
            btn.onclick = () => {
                const funcs = [step1_clean, step2_openPiston, step3_addSol, step4_closePiston, step5_addAuxAndDropper, step6_electrodeInsert];
                funcs[idx]();
            };
            stepsArea.appendChild(btn);
        });
        
        document.getElementById('prevStepBtn').onclick = prevStep;
        document.getElementById('nextStepBtn').onclick = nextStep;
        document.getElementById('resetBtn').onclick = resetExperiment;
        
        resetExperiment();
        
        // 漂浮粒子装饰
        const particleCount = 500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 11;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 4.2 + 0.9;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 10 - 2;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x9accee, size: 0.022, transparent: true, opacity: 0.4 }));
        scene.add(particles);
        
        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0018;
            particles.rotation.x = Math.sin(Date.now() * 0.0007) * 0.04;
            if (pistonOpen && window.pistonLight) window.pistonLight.intensity = 0.58 + Math.sin(Date.now() * 0.01) * 0.18;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
