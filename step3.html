<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D虚拟实验：辅助液配制 · 电导率匹配 | 液面没过电极 | 圆柱形烧杯</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        .left-dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 360px;
            max-height: calc(100% - 40px);
            background: rgba(20, 40, 65, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
            border: 1px solid rgba(100, 180, 250, 0.5);
            z-index: 20;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #f0f4fa;
        }
        .left-dashboard::-webkit-scrollbar {
            width: 5px;
        }
        .left-dashboard::-webkit-scrollbar-track {
            background: #2c4c6e;
            border-radius: 10px;
        }
        .left-dashboard::-webkit-scrollbar-thumb {
            background: #7aa9d0;
            border-radius: 10px;
        }
        .dashboard-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 2px solid #4f9eff;
            padding-bottom: 12px;
        }
        .dashboard-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        .purpose-card {
            background: rgba(30, 70, 110, 0.7);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 18px;
            border-left: 5px solid #ffaa66;
            font-size: 0.85rem;
        }
        .reagents-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .reagent-badge {
            background: rgba(255,255,240,0.2);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
        }
        .meter-dual {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .meter-card {
            background: #0a2a3b;
            border-radius: 24px;
            padding: 10px;
            flex: 1;
            text-align: center;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            border: 1px solid #3a7ca5;
        }
        .meter-card .label {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        .meter-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            line-height: 1.2;
        }
        .target-meter {
            background: #1e4a6e;
            border-color: #ffaa66;
        }
        .btn-group-vertical {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 18px 0 15px;
        }
        .btn {
            background: #2a6b9e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.08s linear;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(2px); }
        .btn.kcl { background: #c97e3a; }
        .btn.water { background: #3f8f8f; }
        .btn.reset { background: #8f7a6b; }
        .btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .match-indicator {
            background: #1e405b;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 12px 0;
            border-left: 5px solid #ffaa66;
        }
        .step-status-box {
            background: #0e334d;
            border-radius: 24px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.8rem;
        }
        .step-badge {
            display: inline-block;
            background: #ffaa55;
            color: #1f3a4b;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-right: 8px;
        }
        .info-note {
            font-size: 0.7rem;
            margin-top: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 8px;
        }
        hr {
            border-color: #4f7faa;
            margin: 12px 0;
        }
        @media (max-width: 700px) {
            .left-dashboard { width: 280px; padding: 14px; top: 10px; left: 10px; max-height: 95%; }
            .meter-card .value { font-size: 1.3rem; }
            .btn { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="left-dashboard">
        <div class="dashboard-header">
            <i class="fas fa-flask fa-2x" style="color:#88ccff;"></i>
            <h2>辅助液配制 · 电导率匹配</h2>
        </div>
        <div class="purpose-card">
            <i class="fas fa-bullseye" style="color:#ffaa66;"></i> 
            <strong>实验目的：</strong>配制与纯化后 Fe(OH)₃ 溶胶电导率相同的辅助液（稀KCl溶液），确保电泳清晰界面。
        </div>
        <div class="reagents-row">
            <span class="reagent-badge"><i class="fas fa-cube"></i> 0.1 mol/L KCl</span>
            <span class="reagent-badge"><i class="fas fa-water"></i> 蒸馏水</span>
            <span class="reagent-badge"><i class="fas fa-chart-line"></i> 电导率仪</span>
        </div>
        
        <div class="meter-dual">
            <div class="meter-card target-meter">
                <div class="label"><i class="fas fa-bullseye"></i> 溶胶 (目标)</div>
                <div class="value" id="solCondDisplay3D">---</div>
                <div class="unit">µS/cm</div>
            </div>
            <div class="meter-card">
                <div class="label"><i class="fas fa-tint"></i> 辅助液</div>
                <div class="value" id="auxCondDisplay3D">0.0</div>
                <div class="unit">µS/cm</div>
            </div>
        </div>
        
        <div class="btn-group-vertical">
            <button class="btn" id="measureBtn3D"><i class="fas fa-syringe"></i> 1. 测量溶胶</button>
            <button class="btn kcl" id="addKClBtn3D"><i class="fas fa-plus-circle"></i> +KCl (↑电导率)</button>
            <button class="btn water" id="addWaterBtn3D"><i class="fas fa-minus-circle"></i> +蒸馏水 (↓电导率)</button>
            <button class="btn reset" id="resetBtn3D"><i class="fas fa-undo-alt"></i> 重置实验</button>
        </div>
        
        <div class="match-indicator" id="matchIndicator3D">
            ⚡ 未测量溶胶
        </div>
        
        <div class="step-status-box" id="stepDescUI">
            <span class="step-badge">步骤0</span> 点击「测量溶胶」获取目标电导率
        </div>
        
        <div class="info-note">
            <i class="fas fa-info-circle"></i> 每步操作: +KCl ≈ +15 µS/cm &nbsp;|&nbsp; +水 ≈ -8 µS/cm<br>
            <i class="fas fa-mouse-pointer"></i> 鼠标拖拽旋转3D视角<br>
            <i class="fas fa-chart-line"></i> 辅助液液面从底部上升至圆环下方，完全没过电极探头
        </div>
        <hr>
        <div class="info-note" style="background: none;">
            <i class="fas fa-lightbulb"></i> 电导率匹配原理：避免电泳时界面模糊，保持清晰泳动带。
        </div>
    </div>

    <div id="canvas-container" style="width:100vw; height:100vh; overflow:hidden;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ========== 实验逻辑 ==========
        let currentStep = 0;
        let solCond = 0;
        let auxCond = 0.0;
        const TOLERANCE = 10;
        
        const solCondDisplay = document.getElementById('solCondDisplay3D');
        const auxCondDisplay = document.getElementById('auxCondDisplay3D');
        const measureBtn = document.getElementById('measureBtn3D');
        const addKClBtn = document.getElementById('addKClBtn3D');
        const addWaterBtn = document.getElementById('addWaterBtn3D');
        const resetBtn = document.getElementById('resetBtn3D');
        const matchIndicator = document.getElementById('matchIndicator3D');
        const stepDescUI = document.getElementById('stepDescUI');
        
        function updateUIState() {
            if (currentStep === 0) {
                stepDescUI.innerHTML = `<span class="step-badge">步骤0</span> 点击「测量溶胶」获取Fe(OH)₃溶胶电导率 (200-400 µS/cm)`;
            } else if (currentStep === 1) {
                stepDescUI.innerHTML = `<span class="step-badge">步骤1</span> 已测量溶胶: ${solCond} µS/cm，辅助液为蒸馏水(0)，开始调节`;
            } else if (currentStep === 2) {
                stepDescUI.innerHTML = `<span class="step-badge">步骤2</span> 初始辅助液为纯水，使用+KCl增加电导率，或加水降低`;
            } else if (currentStep === 3) {
                stepDescUI.innerHTML = `<span class="step-badge">步骤3</span> 调节中: 目标 ${solCond} µS/cm，当前误差 ${Math.abs(auxCond - solCond).toFixed(1)} µS/cm`;
            } else if (currentStep === 4) {
                stepDescUI.innerHTML = `<span class="step-badge">✅ 成功</span> 匹配成功！辅助液电导率 = ${auxCond.toFixed(1)} µS/cm，与溶胶一致，可用于电泳实验。`;
            }
            
            const enableAdjust = (currentStep >= 1 && currentStep <= 3) && currentStep !== 4;
            measureBtn.disabled = !(currentStep === 0);
            addKClBtn.disabled = !enableAdjust;
            if (auxCond <= 0.1 && enableAdjust) {
                addWaterBtn.disabled = true;
            } else {
                addWaterBtn.disabled = !enableAdjust;
            }
            
            if (solCond === 0) {
                matchIndicator.innerHTML = `⚡ 未测量溶胶`;
                matchIndicator.style.background = "#1e405b";
                matchIndicator.style.borderLeftColor = "#ffaa66";
            } else if (currentStep === 4) {
                const diff = Math.abs(auxCond - solCond);
                matchIndicator.innerHTML = `✅ 匹配成功！ 误差 ${diff.toFixed(1)} µS/cm`;
                matchIndicator.style.background = "#2a6b4e";
                matchIndicator.style.borderLeftColor = "#aaffaa";
            } else {
                const diff = Math.abs(auxCond - solCond);
                matchIndicator.innerHTML = `⚡ 误差 ${diff.toFixed(1)} µS/cm (目标±10)`;
                matchIndicator.style.background = "#5a3e2a";
                matchIndicator.style.borderLeftColor = "#ffaa66";
            }
            
            solCondDisplay.innerText = solCond > 0 ? solCond : '---';
            auxCondDisplay.innerText = auxCond.toFixed(1);
        }
        
        function checkMatchAndStep() {
            if (solCond === 0) return;
            const diff = Math.abs(auxCond - solCond);
            if (diff <= TOLERANCE && currentStep >= 1 && currentStep <= 3 && currentStep !== 4) {
                currentStep = 4;
                updateUIState();
                if (window.matchEffect) window.matchEffect();
            } else if (diff > TOLERANCE && currentStep === 4) {
                currentStep = 3;
                updateUIState();
            }
            if (solCond > 0 && currentStep !== 4 && currentStep !== 0) {
                if (currentStep === 1) currentStep = 2;
                if (diff > TOLERANCE && currentStep !== 3) currentStep = 3;
                updateUIState();
            }
        }
        
        function measureSol() {
            if (currentStep !== 0) return;
            solCond = Math.floor(Math.random() * (400 - 200 + 1)) + 200;
            auxCond = 0.0;
            currentStep = 2;
            updateUIState();
            if (window.update3DLiquidByAuxCond) window.update3DLiquidByAuxCond(auxCond);
            if (window.showSolElectrodeAndAnimate) window.showSolElectrodeAndAnimate();
        }
        
        function addKCl() {
            if (currentStep === 0 || currentStep === 4) return;
            auxCond = Math.min(auxCond + 15, 600);
            updateUIState();
            if (window.update3DLiquidByAuxCond) window.update3DLiquidByAuxCond(auxCond);
            checkMatchAndStep();
            if (window.ensureAuxElectrodeVisible) window.ensureAuxElectrodeVisible();
        }
        
        function addWater() {
            if (currentStep === 0 || currentStep === 4) return;
            if (auxCond >= 8) auxCond = Math.max(auxCond - 8, 0);
            else auxCond = 0;
            updateUIState();
            if (window.update3DLiquidByAuxCond) window.update3DLiquidByAuxCond(auxCond);
            checkMatchAndStep();
            if (window.ensureAuxElectrodeVisible) window.ensureAuxElectrodeVisible();
        }
        
        function resetAll() {
            solCond = 0;
            auxCond = 0.0;
            currentStep = 0;
            updateUIState();
            if (window.update3DLiquidByAuxCond) window.update3DLiquidByAuxCond(0);
            if (window.hideSolElectrode) window.hideSolElectrode();
            if (window.hideAuxElectrode) window.hideAuxElectrode();
        }
        
        measureBtn.addEventListener('click', measureSol);
        addKClBtn.addEventListener('click', addKCl);
        addWaterBtn.addEventListener('click', addWater);
        resetBtn.addEventListener('click', resetAll);
        
        // ========== 3D场景 ==========
        const container = document.getElementById('canvas-container');
        if (!container) {
            console.error('容器不存在');
        } else {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xc8e7ff);
            scene.fog = new THREE.FogExp2(0xc8e7ff, 0.008);
            
            const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(4.2, 2.8, 5.2);
            camera.lookAt(0, 0.9, 0);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(labelRenderer.domElement);
            
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.enableZoom = true;
            controls.enablePan = true;
            controls.target.set(0, 0.9, 0);
            
            // 灯光
            const ambientLight = new THREE.AmbientLight(0x7c9ec0, 0.7);
            scene.add(ambientLight);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.1);
            mainLight.position.set(3, 5, 2);
            mainLight.castShadow = true;
            mainLight.receiveShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0xccaa77, 0.5);
            fillLight.position.set(1, 2, 2.5);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0x88aacc, 0.4);
            backLight.position.set(-2, 2, -3);
            scene.add(backLight);
            const tableLight = new THREE.PointLight(0xccaa88, 0.35);
            tableLight.position.set(0, 0.5, 1);
            scene.add(tableLight);
            
            const gridHelper = new THREE.GridHelper(9, 20, 0x88aacc, 0x6688aa);
            gridHelper.position.y = -0.68;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);
            
            // 浅色木纹纹理
            function createLightWoodTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#dbb47a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 400; i++) {
                    const y = Math.random() * canvas.height;
                    const height = 4 + Math.random() * 12;
                    const alpha = 0.2 + Math.random() * 0.35;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.bezierCurveTo(canvas.width * 0.3, y + (Math.random() - 0.5) * 20, canvas.width * 0.7, y + (Math.random() - 0.5) * 20, canvas.width, y);
                    ctx.lineWidth = height;
                    ctx.strokeStyle = `rgba(100, 65, 35, ${alpha})`;
                    ctx.stroke();
                }
                for (let i = 0; i < 30; i++) {
                    const centerX = canvas.width / 2 + (Math.random() - 0.5) * 150;
                    const centerY = canvas.height / 2 + (Math.random() - 0.5) * 150;
                    ctx.beginPath();
                    ctx.ellipse(centerX, centerY, 40 + Math.random() * 100, 30 + Math.random() * 80, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(120, 75, 40, 0.12)`;
                    ctx.fill();
                }
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(2, 1.5);
                return texture;
            }
            
            const lightWoodTexture = createLightWoodTexture();
            lightWoodTexture.wrapS = THREE.RepeatWrapping;
            lightWoodTexture.wrapT = THREE.RepeatWrapping;
            lightWoodTexture.repeat.set(2.2, 1.8);
            
            // 实验台
            const tableMat = new THREE.MeshStandardMaterial({ map: lightWoodTexture, roughness: 0.55, metalness: 0.05, color: 0xd9a87a });
            const tableTop = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.12, 4.5), tableMat);
            tableTop.position.set(0, -0.62, 0);
            tableTop.receiveShadow = true;
            tableTop.castShadow = true;
            scene.add(tableTop);
            
            // 桌腿
            const legMat = new THREE.MeshStandardMaterial({ map: lightWoodTexture, roughness: 0.65, color: 0xc28f60 });
            const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.2);
            const positions = [[-2.2, -0.88, -1.5], [2.2, -0.88, -1.5], [-2.2, -0.88, 1.6], [2.2, -0.88, 1.6]];
            positions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                scene.add(leg);
            });
            
            // 烧杯函数：上下同宽，圆环材质与杯身一致
            function createBeaker(x, z, glassColor, labelText, labelColor = '#f0f0f0') {
                const group = new THREE.Group();
                const glassMat = new THREE.MeshPhysicalMaterial({ color: glassColor, metalness: 0.85, roughness: 0.2, transparent: true, opacity: 0.5, clearcoat: 1 });
                const bodyGeo = new THREE.CylinderGeometry(0.65, 0.65, 1.35, 32);
                const glass = new THREE.Mesh(bodyGeo, glassMat);
                glass.castShadow = true;
                group.add(glass);
                
                const rimMat = glassMat.clone();
                const rimGeo = new THREE.TorusGeometry(0.66, 0.035, 32, 100);
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.position.y = 0.7;
                rim.rotation.x = Math.PI / 2;
                group.add(rim);
                
                const baseMat = new THREE.MeshStandardMaterial({ color: 0xbcae8c, roughness: 0.5 });
                const baseGeo = new THREE.CylinderGeometry(0.62, 0.68, 0.08, 24);
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = -0.65;
                base.castShadow = true;
                group.add(base);
                
                group.position.set(x, -0.18, z);
                
                const div = document.createElement('div');
                div.textContent = labelText;
                div.style.color = labelColor;
                div.style.fontSize = '17px';
                div.style.fontWeight = 'bold';
                div.style.textShadow = '1px 1px 0px #000000';
                div.style.background = 'rgba(0,0,0,0.6)';
                div.style.padding = '3px 14px';
                div.style.borderRadius = '30px';
                div.style.backdropFilter = 'blur(8px)';
                const labelObj = new CSS2DObject(div);
                labelObj.position.set(x, 1.22, z);
                scene.add(labelObj);
                return { group, labelObj };
            }
            
            function createLiquidMesh(radius, heightBase, yOffset, colorInit) {
                const geometry = new THREE.CylinderGeometry(radius, radius, heightBase, 32);
                const material = new THREE.MeshStandardMaterial({ color: colorInit, emissive: 0x112233, transparent: true, opacity: 0.9, roughness: 0.25 });
                const liquid = new THREE.Mesh(geometry, material);
                liquid.castShadow = true;
                liquid.position.y = yOffset;
                return liquid;
            }
            
            const solBeaker = createBeaker(-1.5, 0.9, 0xbacfe5, 'Fe(OH)₃ 溶胶', '#ffcf9a');
            scene.add(solBeaker.group);
            const auxBeaker = createBeaker(1.4, 0.85, 0xc2d9f0, '辅助液 (KCl)', '#b8e2ff');
            scene.add(auxBeaker.group);
            
            // 溶胶液面高度固定为0.5，低于圆环(0.7)
            const solLiquidHeight = 0.5;
            const solLiquidBaseY = -0.45;
            const solLiquidPosY = solLiquidBaseY + solLiquidHeight / 2;
            const solLiquid = createLiquidMesh(0.55, solLiquidHeight, solLiquidPosY, 0xcf7a48);
            solLiquid.material.color.setHex(0xd1723c);
            solBeaker.group.add(solLiquid);
            
            // 辅助液液体：初始高度0.12，最大高度0.65（圆环下方0.05）
            let auxLiquidMesh = createLiquidMesh(0.55, 0.12, -0.45 + 0.06, 0x6fa3c9);
            auxBeaker.group.add(auxLiquidMesh);
            
            // 液面映射：电导率0~600 µS/cm 对应高度 0.12 ~ 0.65，顶部y=-0.45+0.65=0.20
            function update3DLiquidByAuxCond(cond) {
                const minH = 0.12;
                const maxH = 0.65;
                let height = minH + (cond / 600) * (maxH - minH);
                height = Math.min(maxH, Math.max(minH, height));
                auxLiquidMesh.scale.y = height / 0.88;
                const baseY = -0.45;
                const newY = baseY + (height / 2);
                auxLiquidMesh.position.y = newY;
                const t = Math.min(1, cond / 550);
                const r = 0.35 + t * 0.55;
                const g = 0.65 - t * 0.35;
                const b = 0.9 - t * 0.2;
                auxLiquidMesh.material.color.setRGB(r, g, b);
                auxLiquidMesh.material.emissiveIntensity = 0.1 + t * 0.2;
            }
            window.update3DLiquidByAuxCond = update3DLiquidByAuxCond;
            
            // 电极模型
            function createElectrodeModel() {
                const group = new THREE.Group();
                const rodMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.7, roughness: 0.3 });
                const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.9, 8), rodMat);
                rod.position.y = 0;
                group.add(rod);
                const tipMat = new THREE.MeshStandardMaterial({ color: 0xdd8866, metalness: 0.5 });
                const tip = new THREE.Mesh(new THREE.SphereGeometry(0.065, 16, 16), tipMat);
                tip.position.y = -0.45;
                group.add(tip);
                const handleMat = new THREE.MeshStandardMaterial({ color: 0xaa9977, metalness: 0.4 });
                const handleRing = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.02, 16, 32), handleMat);
                handleRing.rotation.x = Math.PI / 2;
                handleRing.position.y = 0.48;
                group.add(handleRing);
                const topCap = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.09, 0.08, 8), handleMat);
                topCap.position.y = 0.52;
                group.add(topCap);
                const wireMat = new THREE.MeshStandardMaterial({ color: 0x886644 });
                const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6), wireMat);
                wire.position.set(0.12, 0.65, 0);
                wire.rotation.z = 0.5;
                group.add(wire);
                return group;
            }
            
            const solElectrode = createElectrodeModel();
            solElectrode.position.set(-1.5, 1.02, 0.9);
            solElectrode.visible = false;
            scene.add(solElectrode);
            
            const auxElectrode = createElectrodeModel();
            auxElectrode.position.set(1.4, 1.02, 0.85);
            auxElectrode.visible = false;
            scene.add(auxElectrode);
            
            let solAnimId = null;
            let auxAnimId = null;
            
            // 溶胶电极插入动画 (终点局部y=0.22，仍然在液面下)
            function showSolElectrodeAndAnimate() {
                if (solElectrode.visible) return;
                solElectrode.visible = true;
                const startY = 1.02;
                const endY = 0.22;
                solElectrode.position.y = startY;
                let startTime = null;
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    let t = Math.min(1, elapsed / 400);
                    const easeOut = 1 - Math.pow(1 - t, 2);
                    const newY = startY - (startY - endY) * easeOut;
                    solElectrode.position.y = newY;
                    if (t < 1) {
                        solAnimId = requestAnimationFrame(animate);
                    } else {
                        solElectrode.position.y = endY;
                        solAnimId = null;
                        const rodMat = solElectrode.children[0].material;
                        rodMat.emissiveIntensity = 0.5;
                        setTimeout(() => { rodMat.emissiveIntensity = 0; }, 300);
                    }
                }
                if (solAnimId) cancelAnimationFrame(solAnimId);
                solAnimId = requestAnimationFrame(animate);
            }
            
            function hideSolElectrode() {
                if (solAnimId) cancelAnimationFrame(solAnimId);
                solElectrode.visible = false;
                solElectrode.position.y = 1.02;
            }
            
            // 辅助液电极插入动画：终点全局y = -0.03，使电极尖端完全浸没在液面以下
            function ensureAuxElectrodeVisible() {
                if (auxElectrode.visible) return;
                auxElectrode.visible = true;
                const startY = 1.02;
                const endY = -0.03;  // 电极尖端浸没深度超过最高液面0.20
                auxElectrode.position.y = startY;
                let startTime = null;
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const elapsed = timestamp - startTime;
                    let t = Math.min(1, elapsed / 400);
                    const easeOut = 1 - Math.pow(1 - t, 2);
                    const newY = startY - (startY - endY) * easeOut;
                    auxElectrode.position.y = newY;
                    if (t < 1) {
                        auxAnimId = requestAnimationFrame(animate);
                    } else {
                        auxElectrode.position.y = endY;
                        auxAnimId = null;
                        const rodMat = auxElectrode.children[0].material;
                        rodMat.emissiveIntensity = 0.5;
                        setTimeout(() => { rodMat.emissiveIntensity = 0; }, 300);
                    }
                }
                if (auxAnimId) cancelAnimationFrame(auxAnimId);
                auxAnimId = requestAnimationFrame(animate);
            }
            
            function hideAuxElectrode() {
                if (auxAnimId) cancelAnimationFrame(auxAnimId);
                auxElectrode.visible = false;
                auxElectrode.position.y = 1.02;
            }
            
            window.showSolElectrodeAndAnimate = showSolElectrodeAndAnimate;
            window.hideSolElectrode = hideSolElectrode;
            window.ensureAuxElectrodeVisible = ensureAuxElectrodeVisible;
            window.hideAuxElectrode = hideAuxElectrode;
            
            // 粒子系统
            const particleCount = 600;
            const particleGeo = new THREE.BufferGeometry();
            const positionsArray = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positionsArray[i*3] = (Math.random() - 0.5) * 10;
                positionsArray[i*3+1] = Math.random() * 3.2;
                positionsArray[i*3+2] = (Math.random() - 0.5) * 7 - 1;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xaaddff, size: 0.025, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            const auxGlow = new THREE.PointLight(0x88aaff, 0.5, 2.2);
            auxGlow.position.set(1.4, 0.72, 0.85);
            scene.add(auxGlow);
            const solGlow = new THREE.PointLight(0xffaa77, 0.45, 2);
            solGlow.position.set(-1.5, 0.67, 0.9);
            scene.add(solGlow);
            
            window.matchEffect = () => {
                auxGlow.intensity = 1.3;
                auxGlow.color.setHex(0xaaffaa);
                setTimeout(() => { auxGlow.intensity = 0.5; auxGlow.color.setHex(0x88aaff); }, 600);
                const burstGeo = new THREE.BufferGeometry();
                const burstPos = [];
                for (let i=0; i<70; i++) {
                    burstPos.push((Math.random() - 0.5)*1.4 + 1.4);
                    burstPos.push(Math.random()*1.4 + 0.37);
                    burstPos.push((Math.random() - 0.5)*1.3 + 0.85);
                }
                burstGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(burstPos), 3));
                const burstMat = new THREE.PointsMaterial({ color: 0xffdd99, size: 0.05 });
                const burstPoints = new THREE.Points(burstGeo, burstMat);
                scene.add(burstPoints);
                setTimeout(() => scene.remove(burstPoints), 550);
            };
            
            update3DLiquidByAuxCond(0);
            
            // 溶胶脉冲（仅当电极可见且溶胶已测量）
            setInterval(() => {
                if (solCond > 0 && currentStep !== 4 && solElectrode.visible) {
                    const origHex = solLiquid.material.color.getHex();
                    solLiquid.material.color.setHex(0xe5905a);
                    setTimeout(() => solLiquid.material.color.setHex(origHex), 300);
                }
            }, 2000);
            
            function animate() {
                requestAnimationFrame(animate);
                const elapsed = performance.now() * 0.002;
                particles.rotation.y = elapsed * 0.08;
                particles.rotation.x = Math.sin(elapsed * 0.2) * 0.1;
                auxGlow.intensity = 0.5 + Math.sin(elapsed * 2.2) * 0.12;
                solGlow.intensity = 0.45 + Math.sin(elapsed * 1.9) * 0.1;
                controls.update();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            console.log("3D场景初始化完成：辅助液液面从底部上升，电极完全浸没");
        }
        
        updateUIState();
    </script>
</body>
</html>
